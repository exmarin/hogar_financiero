function bindSubscriptions() {
  document.querySelectorAll('[data-form-action]').forEach(el => {
    el.addEventListener('click', e => {
      const a = e.currentTarget.dataset.formAction;
      if (a === 'show-sub') {
        SubForm.reset();
        SubForm.show = true;
        render();
      }
      if (a === 'cancel-sub') {
        SubForm.show = false;
        render();
      }
      if (a === 'set-sub-kind') {
        const newKind = e.currentTarget.dataset.kind;
        if (SubForm.kind !== newKind) {
          SubForm.kind = newKind;
          // Reset categoría al primero del nuevo set
          const cats = SubForm.availableCategories();
          SubForm.category = cats[0] || '';
          render();
        }
      }
      if (a === 'save-sub') saveSubscription();
    });
  });
}

function saveSubscription() {
  const name = document.getElementById('sub-name').value.trim();
  const amount = parseFloat(document.getElementById('sub-amount').value);
  const day = parseInt(document.getElementById('sub-day').value);
  const personId = document.getElementById('sub-person').value;
  const category = document.getElementById('sub-category').value;

  if (!name || !amount || amount <= 0) {
    showToast('Completa nombre y monto válido', 'error');
    return;
  }

  State.subscriptions.push({
    id: uid('s'),
    kind: SubForm.kind, // 'income' | 'expense'
    name, amount, personId, category,
    paymentDay: day || 1,
    active: true,
    createdAt: today()
  });
  State.saveSubscriptions();
  SubForm.reset();
  showToast(SubForm.kind === 'income' ? '✓ Ingreso recurrente agregado' : '✓ Suscripción agregada');
  render();
}

function toggleSubscription(id) {
  State.subscriptions = State.subscriptions.map(s =>
    s.id === id ? { ...s, active: !s.active } : s
  );
  State.saveSubscriptions();
  render();
}

function deleteSubscription(id) {
  if (!confirm2('¿Eliminar esta suscripción?')) return;
  State.subscriptions = State.subscriptions.filter(s => s.id !== id);
  State.saveSubscriptions();
  showToast('✓ Eliminada');
  render();
}

function generateSubscriptionMonth(id) {
  const sub = State.subscriptions.find(s => s.id === id);
  if (!sub) return;
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(sub.paymentDay).padStart(2, '0')}`;
  const mk = monthKey(date);

  // Verificar duplicados
  const exists = State.transactions.some(t =>
    t.type === 'subscription' &&
    t.description === sub.name &&
    monthKey(t.date) === mk
  );
  if (exists) {
    showToast(`Ya existe un registro de "${sub.name}" este mes`, 'error');
    return;
  }

  State.transactions.push({
    id: uid('t'),
    kind: sub.kind === 'income' ? 'income' : 'expense',
    date,
    personId: sub.personId,
    category: sub.category,
    description: sub.name,
    amount: sub.amount,
    paymentMethod: sub.kind === 'income' ? '' : 'Auto-generado',
    notes: sub.kind === 'income' ? 'Ingreso recurrente generado automáticamente' : 'Suscripción mensual generada automáticamente',
    type: 'subscription',
    createdBy: State.currentUser,
    createdAt: new Date().toISOString()
  });
  State.saveTransactions();
  showToast(sub.kind === 'income' ? '✓ Ingreso del mes generado' : '✓ Gasto del mes generado');
  render();
}

// =============================================================================
// INSTALLMENTS VIEW
// =============================================================================
function renderInstallments() {
  // Group by groupId
  const groups = {};
  State.transactions.forEach(t => {
    if (t.installmentInfo?.groupId) {
      if (!groups[t.installmentInfo.groupId]) {
        groups[t.installmentInfo.groupId] = {
          groupId: t.installmentInfo.groupId,
          description: t.description,
          personId: t.personId,
          category: t.category,
          totalAmount: t.installmentInfo.totalAmount,
          totalInstallments: t.installmentInfo.total,
          installmentAmount: t.amount,
          items: []
        };
      }
      groups[t.installmentInfo.groupId].items.push(t);
    }
  });
  const list = Object.values(groups).map(g => {
    const now = new Date();
    g.items.sort((a, b) => a.date.localeCompare(b.date));
    g.paid = g.items.filter(i => new Date(i.date + 'T00:00:00') < now).length;
    g.pending = g.items.length - g.paid;
    return g;
  }).sort((a, b) => b.items[0].date.localeCompare(a.items[0].date));

  const totalDebt = list.reduce((s, g) => s + (g.pending * g.installmentAmount), 0);

  // Próximo mes
  const next = new Date();
  next.setMonth(next.getMonth() + 1);
  const nextKey = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
  const nextMonth = State.transactions
    .filter(t => t.installmentInfo && monthKey(t.date) === nextKey)
    .reduce((s, t) => s + t.amount, 0);

  return `
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="card p-4">
          <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Deuda pendiente</p>
          <p class="font-display text-2xl font-bold number">${fmt(totalDebt)}</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">${list.filter(g => g.pending > 0).length} compras activas</p>
        </div>
        <div class="card p-4">
          <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Cuotas próximo mes</p>
          <p class="font-display text-2xl font-bold number">${fmt(nextMonth)}</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">A pagar próximamente</p>
        </div>
      </div>

      ${list.length === 0 ? `
        <div class="card p-8 text-center">
          <i data-lucide="credit-card" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
          <p style="color: var(--color-text-muted);">Sin compras a cuotas registradas</p>
        </div>
      ` : `
        <div class="space-y-3">
          ${list.map(g => {
            const p = getPerson(g.personId);
            const progress = (g.paid / g.totalInstallments) * 100;
            return `
              <div class="card p-4">
                <div class="flex items-start justify-between mb-3 gap-3">
                  <div class="min-w-0 flex-1">
                    <p class="font-semibold truncate">${escapeHtml(g.description)}</p>
                    <p class="text-xs" style="color: var(--color-text-muted);">
                      ${escapeHtml(p ? p.name : '?')} · ${escapeHtml(g.category)}
                    </p>
                  </div>
                  <div class="text-right flex-shrink-0">
                    <p class="font-display font-bold number">${fmt(g.totalAmount)}</p>
                    <p class="text-xs" style="color: var(--color-text-muted);">${fmt(g.installmentAmount)} × ${g.totalInstallments}</p>
                  </div>
                </div>
                <div class="mb-2">
                  <div class="flex justify-between text-xs mb-1" style="color: var(--color-text-muted);">
                    <span>${g.paid} pagadas / ${g.pending} pendientes</span>
                    <span class="font-semibold">${progress.toFixed(0)}%</span>
                  </div>
                  <div class="h-2 rounded-full overflow-hidden" style="background: var(--color-border);">
                    <div class="h-full transition-all" style="width: ${progress}%; background: var(--color-primary);"></div>
                  </div>
                </div>
                <div class="flex flex-wrap gap-1 mt-3">
                  ${g.items.map(c => {
                    const paid = new Date(c.date + 'T00:00:00') < new Date();
                    return `
                      <span class="text-xs px-2 py-1 rounded inline-flex items-center gap-1"
                            style="background: ${paid ? 'var(--color-success-soft)' : 'var(--color-bg-2)'};
                                   color: ${paid ? 'var(--color-success)' : 'var(--color-text-muted)'};"
                            title="${new Date(c.date + 'T00:00:00').toLocaleDateString('es-CL')} — ${fmt(c.amount)}">
                        ${paid ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                        #${c.installmentInfo.number}
                      </span>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

// =============================================================================
// ANALYSIS VIEW (insights automáticos)
// =============================================================================
function renderAnalysis() {
  const txs = State.transactions || [];
  if (txs.length === 0) {
    return `
      <div class="card p-8 text-center">
        <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
        <p class="font-display text-lg font-bold mb-2">Sin movimientos para analizar</p>
        <p class="text-sm" style="color: var(--color-text-muted);">
          Cargá algunos gastos y volvé acá para ver tus insights automáticos.
        </p>
      </div>
    `;
  }

  // -- Helpers --
  const now = new Date();
  const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevMonthKey = `${prevDate.getFullYear()}-${String(prevDate.getMonth() + 1).padStart(2, '0')}`;

  // Solo gastos para el análisis tradicional
  const monthTxs = txs.filter(t => monthKey(t.date) === currentMonthKey && isExpenseTx(t));
  const prevMonthTxs = txs.filter(t => monthKey(t.date) === prevMonthKey && isExpenseTx(t));

  // Ingresos por mes (para proyecciones)
  const incomeTxs = txs.filter(isIncomeTx);
  const monthIncomeTxs = txs.filter(t => monthKey(t.date) === currentMonthKey && isIncomeTx(t));

  const totalMonth = monthTxs.reduce((s, t) => s + t.amount, 0);
  const totalPrevMonth = prevMonthTxs.reduce((s, t) => s + t.amount, 0);
  const totalMonthIncome = monthIncomeTxs.reduce((s, t) => s + t.amount, 0);

  // -- Insight 1: gastos pequeños del mes (< $5.000 CLP) --
  const SMALL_THRESHOLD = 5000;
  const smallTxs = monthTxs.filter(t => t.amount < SMALL_THRESHOLD);
  const smallTotal = smallTxs.reduce((s, t) => s + t.amount, 0);
  const smallPct = totalMonth > 0 ? (smallTotal / totalMonth * 100) : 0;

  // -- Insight 2: categoría con más crecimiento --
  const byCatCurrent = {};
  monthTxs.forEach(t => { byCatCurrent[t.category] = (byCatCurrent[t.category] || 0) + t.amount; });
  const byCatPrev = {};
  prevMonthTxs.forEach(t => { byCatPrev[t.category] = (byCatPrev[t.category] || 0) + t.amount; });
  let topGrowth = null;
  for (const cat of Object.keys(byCatCurrent)) {
    const cur = byCatCurrent[cat] || 0;
    const prev = byCatPrev[cat] || 0;
    if (prev === 0) continue; // ignoramos sin base de comparación
    const diff = cur - prev;
    const pct = (diff / prev) * 100;
    if (!topGrowth || pct > topGrowth.pct) {
      topGrowth = { category: cat, current: cur, previous: prev, diff, pct };
    }
  }

  // -- Insight 3: día de la semana donde más gastas --
  const byDow = [0, 0, 0, 0, 0, 0, 0]; // domingo..sábado
  const countByDow = [0, 0, 0, 0, 0, 0, 0];
  txs.forEach(t => {
    const d = new Date(t.date + 'T00:00:00');
    const dow = d.getDay();
    byDow[dow] += t.amount;
    countByDow[dow] += 1;
  });
  const dowNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
  const maxDowIdx = byDow.indexOf(Math.max(...byDow));
  const totalAcrossDays = byDow.reduce((s, x) => s + x, 0);
  const dowPct = totalAcrossDays > 0 ? (byDow[maxDowIdx] / totalAcrossDays * 100) : 0;

  // -- Insight 4: descripciones repetidas (gastos hormiga frecuentes) --
  const byDesc = {};
  monthTxs.forEach(t => {
    const k = (t.description || '').trim().toLowerCase();
    if (!k) return;
    if (!byDesc[k]) byDesc[k] = { count: 0, total: 0, name: t.description };
    byDesc[k].count += 1;
    byDesc[k].total += t.amount;
  });
  const repeated = Object.values(byDesc)
    .filter(x => x.count >= 4) // más de 3 veces en el mes
    .sort((a, b) => b.total - a.total)
    .slice(0, 3);

  // -- Insight 5: top 5 movimientos más caros del mes --
  const top5 = [...monthTxs].sort((a, b) => b.amount - a.amount).slice(0, 5);

  // -- Insight 6: comparativa por categoría (mes actual vs anterior) --
  const allCats = new Set([...Object.keys(byCatCurrent), ...Object.keys(byCatPrev)]);
  const catComparison = Array.from(allCats).map(cat => ({
    category: cat,
    current: byCatCurrent[cat] || 0,
    previous: byCatPrev[cat] || 0,
  })).sort((a, b) => b.current - a.current);

  const maxCatValue = Math.max(...catComparison.flatMap(c => [c.current, c.previous]), 1);

  // -- Insight 7: suscripciones inactivas detectadas --
  // Detectamos suscripciones que no han sido reflejadas como gasto en los últimos 2 meses
  const subs = State.subscriptions || [];
  const inactiveSubs = subs.filter(s => {
    if (!s.active) return false;
    const subKeyword = s.name.toLowerCase();
    const recentlyUsed = txs.some(t => {
      const txDate = new Date(t.date + 'T00:00:00');
      const monthsAgo = (now - txDate) / (1000 * 60 * 60 * 24 * 30);
      return monthsAgo <= 2 && t.description.toLowerCase().includes(subKeyword);
    });
    return !recentlyUsed;
  });

  // ---- Proyecciones (basadas en últimos 3 meses) ----
  const last3MonthKeys = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    last3MonthKeys.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
  }
  const incomeByMonth = last3MonthKeys.map(mk => {
    return txs.filter(t => isIncomeTx(t) && monthKey(t.date) === mk).reduce((s, t) => s + t.amount, 0);
  });
  const expenseByMonth = last3MonthKeys.map(mk => {
    return txs.filter(t => isExpenseTx(t) && monthKey(t.date) === mk).reduce((s, t) => s + t.amount, 0);
  });
  const monthsWithIncomeData = incomeByMonth.filter(v => v > 0).length;
  const monthsWithExpenseData = expenseByMonth.filter(v => v > 0).length;
  const avgIncome = monthsWithIncomeData > 0 ? incomeByMonth.reduce((s, v) => s + v, 0) / monthsWithIncomeData : 0;
  const avgExpense = monthsWithExpenseData > 0 ? expenseByMonth.reduce((s, v) => s + v, 0) / monthsWithExpenseData : 0;
  const projectedYearIncome = avgIncome * 12;
  const projectedYearExpense = avgExpense * 12;
  const projectedYearBalance = projectedYearIncome - projectedYearExpense;
  const projectedSavingsRate = avgIncome > 0 ? ((avgIncome - avgExpense) / avgIncome * 100) : 0;

  // ---- Render ----
  const monthName = monthLabel(currentMonthKey);

  return `
    <div class="space-y-3 sm:space-y-4">
      <!-- Hero -->
      <div class="rounded-2xl p-5 text-white relative overflow-hidden"
           style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));">
        <div class="relative z-10">
          <p class="text-sm opacity-80 mb-1">Análisis automático</p>
          <p class="font-display font-bold text-2xl">${monthName}</p>
          <p class="text-sm opacity-80 mt-1">
            ${monthTxs.length} ${monthTxs.length === 1 ? 'gasto' : 'gastos'} ·
            <strong class="number">${fmt(totalMonth)}</strong> ·
            ${monthIncomeTxs.length} ${monthIncomeTxs.length === 1 ? 'ingreso' : 'ingresos'} ·
            <strong class="number">${fmt(totalMonthIncome)}</strong>
          </p>
        </div>
        <i data-lucide="sparkles" class="w-32 h-32 absolute -right-4 -bottom-4 opacity-10"></i>
      </div>

      <!-- Proyecciones (solo si hay datos suficientes) -->
      ${(monthsWithIncomeData > 0 || monthsWithExpenseData > 0) ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <i data-lucide="line-chart" class="w-5 h-5" style="color: var(--color-primary);"></i>
            Proyecciones (basadas en últimos 3 meses)
          </h3>

          <div class="grid grid-cols-2 gap-3 mb-3">
            ${monthsWithIncomeData > 0 ? `
              <div class="rounded-lg p-3" style="background: var(--color-success-soft);">
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-success);">Promedio ingresos</p>
                <p class="font-display font-bold text-lg number" style="color: var(--color-success);">${fmt(avgIncome)}</p>
                <p class="text-[10px] mt-0.5" style="color: var(--color-text-muted);">/mes</p>
              </div>
            ` : ''}
            ${monthsWithExpenseData > 0 ? `
              <div class="rounded-lg p-3" style="background: var(--color-danger-soft);">
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-danger);">Promedio gastos</p>
                <p class="font-display font-bold text-lg number" style="color: var(--color-danger);">${fmt(avgExpense)}</p>
                <p class="text-[10px] mt-0.5" style="color: var(--color-text-muted);">/mes</p>
              </div>
            ` : ''}
          </div>

          ${avgIncome > 0 ? `
            <div class="rounded-lg p-3 mb-3"
                 style="background: ${projectedYearBalance >= 0 ? 'var(--color-success-soft)' : 'var(--color-danger-soft)'};">
              <div class="flex justify-between items-start mb-1">
                <span class="text-xs uppercase tracking-wider"
                      style="color: ${projectedYearBalance >= 0 ? 'var(--color-success)' : 'var(--color-danger)'};">
                  Proyección anual
                </span>
                <span class="text-xs px-2 py-0.5 rounded-full"
                      style="background: var(--color-surface); color: var(--color-text-muted);">
                  Tasa ahorro ${projectedSavingsRate.toFixed(1)}%
                </span>
              </div>
              <div class="grid grid-cols-3 gap-2 text-sm">
                <div>
                  <p class="text-[10px]" style="color: var(--color-text-muted);">INGRESOS</p>
                  <p class="font-display font-bold number" style="color: var(--color-success);">+${fmt(projectedYearIncome)}</p>
                </div>
                <div>
                  <p class="text-[10px]" style="color: var(--color-text-muted);">GASTOS</p>
                  <p class="font-display font-bold number" style="color: var(--color-danger);">−${fmt(projectedYearExpense)}</p>
                </div>
                <div>
                  <p class="text-[10px]" style="color: var(--color-text-muted);">BALANCE</p>
                  <p class="font-display font-bold number"
                     style="color: ${projectedYearBalance >= 0 ? 'var(--color-success)' : 'var(--color-danger)'};">
                    ${projectedYearBalance >= 0 ? '+' : ''}${fmt(projectedYearBalance)}
                  </p>
                </div>
              </div>
            </div>
          ` : ''}

          <p class="text-xs italic" style="color: var(--color-text-subtle);">
            💡 ${monthsWithIncomeData < 3 || monthsWithExpenseData < 3
              ? `Proyección estimada con ${Math.max(monthsWithIncomeData, monthsWithExpenseData)} de 3 meses de datos. Será más precisa con más historial.`
              : 'Proyección basada en el promedio de los últimos 3 meses. Si tus ingresos o gastos cambian, esta estimación se ajusta automáticamente.'}
          </p>
        </div>
      ` : ''}

      <!-- Insight: Gastos hormiga -->
      ${smallTxs.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-2 flex items-center gap-2">
            <span style="font-size: 18px;">🐜</span>
            Gastos hormiga (menores a ${fmt(SMALL_THRESHOLD)})
          </h3>
          <p class="text-sm" style="color: var(--color-text-muted);">
            Llevas <strong>${smallTxs.length} ${smallTxs.length === 1 ? 'gasto pequeño' : 'gastos pequeños'}</strong>
            que suman <strong class="number" style="color: var(--color-text);">${fmt(smallTotal)}</strong>
            (${smallPct.toFixed(0)}% del mes).
          </p>
          ${smallPct > 15 ? `
            <p class="text-xs mt-2 italic" style="color: var(--color-text-subtle);">
              💡 Los gastos pequeños frecuentes suelen pasar desapercibidos pero acumulan rápido.
            </p>
          ` : ''}
        </div>
      ` : ''}

      <!-- Insight: gastos repetidos -->
      ${repeated.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <span style="font-size: 18px;">🔁</span>
            Compras repetidas este mes
          </h3>
          <div class="space-y-2">
            ${repeated.map(r => `
              <div class="flex items-center justify-between p-2 rounded-lg" style="background: var(--color-bg-2);">
                <div>
                  <p class="text-sm font-medium">${escapeHtml(r.name)}</p>
                  <p class="text-xs" style="color: var(--color-text-muted);">${r.count} veces este mes</p>
                </div>
                <p class="font-display font-bold number">${fmt(r.total)}</p>
              </div>
            `).join('')}
          </div>
          <p class="text-xs mt-3 italic" style="color: var(--color-text-subtle);">
            💡 Revisá si alguna de estas compras la podés hacer una sola vez en mayor cantidad.
          </p>
        </div>
      ` : ''}

      <!-- Insight: Top 5 movimientos del mes -->
      ${top5.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <i data-lucide="trending-up" class="w-5 h-5" style="color: var(--color-primary);"></i>
            Top 5 movimientos del mes
          </h3>
          <div class="space-y-2">
            ${top5.map((t, i) => {
              const p = getPerson(t.personId);
              return `
                <div class="flex items-center justify-between p-2 rounded-lg" style="background: var(--color-bg-2);">
                  <div class="flex items-center gap-3 min-w-0">
                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-white font-bold text-xs flex-shrink-0"
                         style="background: var(--color-primary);">
                      ${i + 1}
                    </div>
                    <div class="min-w-0">
                      <p class="text-sm font-medium truncate">${escapeHtml(t.description)}</p>
                      <p class="text-xs" style="color: var(--color-text-muted);">
                        ${escapeHtml(t.category)} · ${escapeHtml(p?.name || 'Compartido')}
                      </p>
                    </div>
                  </div>
                  <p class="font-display font-bold number flex-shrink-0 ml-2">${fmt(t.amount)}</p>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}

      <!-- Insight: Categoría con más crecimiento -->
      ${topGrowth && topGrowth.pct > 20 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-2 flex items-center gap-2">
            <span style="font-size: 18px;">📈</span>
            Categoría que más creció
          </h3>
          <div class="rounded-lg p-3" style="background: var(--color-warning-soft);">
            <p class="font-semibold" style="color: var(--color-warning);">
              ${escapeHtml(topGrowth.category)}
            </p>
            <p class="text-sm mt-1" style="color: var(--color-text);">
              <span class="number">${fmt(topGrowth.previous)}</span> →
              <strong class="number">${fmt(topGrowth.current)}</strong>
              (<strong>+${topGrowth.pct.toFixed(0)}%</strong>)
            </p>
            <p class="text-xs mt-2 italic" style="color: var(--color-text-muted);">
              💡 Comparado con ${monthLabel(prevMonthKey)}.
            </p>
          </div>
        </div>
      ` : ''}

      <!-- Insight: Día con más gastos -->
      <div class="card p-4">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i data-lucide="calendar" class="w-5 h-5" style="color: var(--color-primary);"></i>
          Tu día más gastador (histórico)
        </h3>
        <div class="grid grid-cols-7 gap-1 mb-2">
          ${dowNames.map((name, i) => {
            const value = byDow[i];
            const pct = totalAcrossDays > 0 ? (value / Math.max(...byDow) * 100) : 0;
            const isMax = i === maxDowIdx && value > 0;
            return `
              <div class="text-center">
                <div class="rounded-md mb-1 transition-all"
                     style="height: 60px; display: flex; flex-direction: column; justify-content: flex-end;
                            background: var(--color-bg-2);">
                  <div style="height: ${pct}%;
                              background: ${isMax ? 'var(--color-primary)' : 'var(--color-primary-soft)'};
                              border-radius: 4px;"></div>
                </div>
                <p class="text-[10px]" style="color: ${isMax ? 'var(--color-primary)' : 'var(--color-text-muted)'};
                                              font-weight: ${isMax ? '700' : '400'};">
                  ${name.slice(0, 3)}
                </p>
              </div>
            `;
          }).join('')}
        </div>
        <p class="text-sm mt-2" style="color: var(--color-text-muted);">
          Gastas más los <strong style="color: var(--color-text);">${dowNames[maxDowIdx].toLowerCase()}</strong>
          (${dowPct.toFixed(0)}% del total).
        </p>
      </div>

      <!-- Insight: Comparativa por categoría -->
      ${catComparison.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <i data-lucide="bar-chart-3" class="w-5 h-5" style="color: var(--color-primary);"></i>
            Por categoría (este mes vs anterior)
          </h3>
          <div class="space-y-3">
            ${catComparison.slice(0, 8).map(c => {
              const curWidth = (c.current / maxCatValue) * 100;
              const prevWidth = (c.previous / maxCatValue) * 100;
              return `
                <div>
                  <div class="flex justify-between text-sm mb-1">
                    <span class="font-medium">${escapeHtml(c.category)}</span>
                    <span class="number" style="color: var(--color-text-muted);">${fmt(c.current)}</span>
                  </div>
                  <div class="space-y-1">
                    <div class="flex items-center gap-2">
                      <span class="text-xs w-12 flex-shrink-0" style="color: var(--color-primary);">Hoy</span>
                      <div class="flex-1 h-3 rounded-full" style="background: var(--color-border);">
                        <div class="h-full rounded-full transition-all"
                             style="width: ${curWidth}%; background: var(--color-primary);"></div>
                      </div>
                    </div>
                    <div class="flex items-center gap-2">

      <!-- Insight: Suscripciones potencialmente inactivas -->
      ${inactiveSubs.length > 0 ? `

// GOALS VIEW (metas de ahorro)
// =============================================================================
const GoalForm = {
  show: false,
  editingId: null,
  name: '',
  target: '',
  saved: '',
  deadline: '',

  reset() {
    this.show = false;
    this.editingId = null;
    this.name = '';
    this.target = '';
    this.saved = '';
    this.deadline = '';
  }
};

function renderGoals() {
  const goals = State.goals || [];
  const totalTarget = goals.reduce((s, g) => s + g.target, 0);
  const totalSaved = goals.reduce((s, g) => s + (g.saved || 0), 0);
  const overallProgress = totalTarget > 0 ? (totalSaved / totalTarget) * 100 : 0;

  return `
    <div class="space-y-4">
      <!-- Hero -->
      <div class="rounded-2xl p-5 text-white relative overflow-hidden"
           style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));">
        <div class="relative z-10">
          <p class="text-sm opacity-80 mb-1">Progreso total de metas</p>
          <p class="font-display font-bold text-3xl number">${fmt(totalSaved)} <span class="text-lg opacity-70">/ ${fmt(totalTarget)}</span></p>
          <div class="mt-3 h-2 rounded-full overflow-hidden" style="background: rgba(255,255,255,0.2);">
            <div class="h-full bg-white transition-all" style="width: ${Math.min(overallProgress, 100)}%;"></div>
          </div>
          <p class="text-sm opacity-80 mt-2">
            ${goals.length} ${goals.length === 1 ? 'meta activa' : 'metas activas'} · ${overallProgress.toFixed(1)}% logrado
          </p>
        </div>
        <i data-lucide="target" class="w-32 h-32 absolute -right-4 -bottom-4 opacity-10"></i>
      </div>

      <!-- Add button / form -->
      ${!GoalForm.show ? `
        <button data-form-action="show-goal" class="w-full p-4 rounded-xl border-2 border-dashed font-semibold transition-all"
                style="border-color: var(--color-border-strong); color: var(--color-text-muted);">
          <i data-lucide="plus" class="w-5 h-5 inline-block mr-1"></i>
          Crear nueva meta
        </button>
      ` : `
        <div class="card p-4 space-y-3">
          <h3 class="font-semibold">${GoalForm.editingId ? 'Editar meta' : 'Nueva meta'}</h3>
          <div>
            <label class="block text-xs font-medium mb-1" style="color: var(--color-text-muted);">NOMBRE</label>
            <input type="text" id="goal-name" class="input" placeholder="Ej: Vacaciones, Auto nuevo..." value="${escapeHtml(GoalForm.name)}">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium mb-1" style="color: var(--color-text-muted);">MONTO OBJETIVO</label>
              <input type="number" id="goal-target" class="input" placeholder="2000000" value="${GoalForm.target}">
            </div>
            <div>
              <label class="block text-xs font-medium mb-1" style="color: var(--color-text-muted);">YA AHORRADO</label>
              <input type="number" id="goal-saved" class="input" placeholder="0" value="${GoalForm.saved}">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium mb-1" style="color: var(--color-text-muted);">FECHA OBJETIVO (opcional)</label>
            <input type="date" id="goal-deadline" class="input" value="${GoalForm.deadline}">
          </div>
          <div class="flex gap-2">
            <button data-form-action="save-goal" class="btn btn-primary flex-1">
              ${GoalForm.editingId ? 'Guardar cambios' : 'Crear meta'}
            </button>
            <button data-form-action="cancel-goal" class="btn btn-secondary">Cancelar</button>
          </div>
        </div>
      `}

      <!-- Lista de metas -->
      ${goals.length === 0 ? `
        <div class="card p-8 text-center">
          <i data-lucide="target" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
          <p style="color: var(--color-text-muted);">Aún no tienes metas definidas</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">Crea tu primera meta de ahorro arriba</p>
        </div>
      ` : `
        <div class="space-y-3">
          ${goals.sort((a, b) => {
            // Pendientes primero, completadas al final
            const ap = (a.saved || 0) >= a.target ? 1 : 0;
            const bp = (b.saved || 0) >= b.target ? 1 : 0;
            return ap - bp;
          }).map(g => {
            const saved = g.saved || 0;
            const progress = g.target > 0 ? (saved / g.target) * 100 : 0;
            const completed = saved >= g.target;
            const remaining = Math.max(0, g.target - saved);

            // Calcular tiempo restante
            let timeInfo = '';
            if (g.deadline) {
              const today = new Date();
              today.setHours(0, 0, 0, 0);
              const deadline = new Date(g.deadline + 'T00:00:00');
              const daysLeft = Math.floor((deadline - today) / (1000 * 60 * 60 * 24));
              if (completed) {
                timeInfo = '🎉 ¡Meta cumplida!';
              } else if (daysLeft < 0) {
                timeInfo = `⚠️ Vencida hace ${Math.abs(daysLeft)} días`;
              } else if (daysLeft === 0) {
                timeInfo = '⏰ Vence hoy';
              } else if (daysLeft <= 30) {
                timeInfo = `⏰ ${daysLeft} días restantes`;
              } else {
                const monthsLeft = Math.floor(daysLeft / 30);
                timeInfo = `${monthsLeft} ${monthsLeft === 1 ? 'mes' : 'meses'} restantes`;
              }
            } else if (completed) {
              timeInfo = '🎉 ¡Meta cumplida!';
            }

            return `
              <div class="card p-4 ${completed ? 'opacity-90' : ''}">
                <div class="flex items-start justify-between gap-3 mb-3">
                  <div class="min-w-0 flex-1">
                    <p class="font-semibold flex items-center gap-2">
                      ${completed ? '<i data-lucide="check-circle-2" class="w-4 h-4" style="color: var(--color-success);"></i>' : ''}
                      ${escapeHtml(g.name)}
                    </p>
                    <p class="text-xs" style="color: var(--color-text-muted);">${timeInfo}</p>
                  </div>
                  <div class="flex gap-1">
                    <button data-action="edit-goal" data-id="${g.id}" class="btn btn-ghost p-2" title="Editar">
                      <i data-lucide="edit-2" class="w-4 h-4"></i>
                    </button>
                    <button data-action="delete-goal" data-id="${g.id}" class="btn btn-ghost p-2" title="Eliminar"
                            style="color: var(--color-danger);">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>

                <div class="grid grid-cols-3 gap-2 text-sm mb-3">
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Ahorrado</p>
                    <p class="font-display font-bold number" style="color: var(--color-success);">${fmt(saved)}</p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Falta</p>
                    <p class="font-display font-bold number">${fmt(remaining)}</p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Objetivo</p>
                    <p class="font-display font-bold number">${fmt(g.target)}</p>
                  </div>
                </div>

                <div>
                  <div class="flex justify-between text-xs mb-1" style="color: var(--color-text-muted);">
                    <span>Progreso</span>
                    <span class="font-semibold">${progress.toFixed(0)}%</span>
                  </div>
                  <div class="h-3 rounded-full overflow-hidden" style="background: var(--color-border);">
                    <div class="h-full transition-all"
                         style="width: ${Math.min(progress, 100)}%;
                                background: ${completed ? 'var(--color-success)' : 'var(--color-primary)'};"></div>
                  </div>
                </div>

                ${!completed ? `
                  <div class="mt-3 pt-3 border-t flex items-center gap-2" style="border-color: var(--color-border);">
                    <input type="number" id="goal-add-${g.id}" class="input flex-1 text-sm py-1.5"
                           placeholder="Agregar ahorro al objetivo">
                    <button data-action="add-goal-saving" data-id="${g.id}" class="btn btn-primary text-sm">
                      <i data-lucide="plus" class="w-4 h-4"></i>
                      Sumar
                    </button>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

function bindGoals() {
  document.querySelectorAll('[data-form-action]').forEach(el => {
    el.addEventListener('click', e => {
      const a = e.currentTarget.dataset.formAction;
      if (a === 'show-goal') {
        GoalForm.reset();
        GoalForm.show = true;
        render();
      }
      if (a === 'cancel-goal') {
        GoalForm.reset();
        render();
      }
      if (a === 'save-goal') saveGoal();
    });
  });
}

function saveGoal() {
  const name = document.getElementById('goal-name').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  const saved = parseFloat(document.getElementById('goal-saved').value) || 0;
  const deadline = document.getElementById('goal-deadline').value;

  if (!name || !target || target <= 0) {
    showToast('Completa nombre y monto objetivo válido', 'error');
    return;
  }

  if (GoalForm.editingId) {
    State.goals = State.goals.map(g =>
      g.id === GoalForm.editingId ? { ...g, name, target, saved, deadline } : g
    );
    showToast('✓ Meta actualizada');
  } else {
    State.goals.push({
      id: uid('g'),
      name, target, saved, deadline,
      createdAt: new Date().toISOString(),
      createdBy: State.currentUser
    });
    showToast('✓ Meta creada');
  }
  State.saveToAPI();
  GoalForm.reset();
  render();
}

function editGoal(id) {
  const g = State.goals.find(g => g.id === id);
  if (!g) return;
  GoalForm.editingId = id;
  GoalForm.name = g.name;
  GoalForm.target = g.target;
  GoalForm.saved = g.saved || 0;
  GoalForm.deadline = g.deadline || '';
  GoalForm.show = true;
  render();
}

function deleteGoal(id) {
  if (!confirm2('¿Eliminar esta meta?')) return;
  State.goals = State.goals.filter(g => g.id !== id);
  State.saveToAPI();
  showToast('✓ Meta eliminada');
  render();
}

function addGoalSaving(id) {
  const input = document.getElementById(`goal-add-${id}`);
  if (!input) return;
  const amount = parseFloat(input.value);
  if (!amount || amount <= 0) {
    showToast('Ingresa un monto válido', 'error');
    return;
  }
  State.goals = State.goals.map(g =>
    g.id === id ? { ...g, saved: (g.saved || 0) + amount } : g
  );
  State.saveToAPI();
  showToast(`✓ ${fmt(amount)} agregado a la meta`);
  render();
}

async function loadAndRenderMembers() {
  const listEl = document.getElementById('members-list');
  const badgeEl = document.getElementById('members-count-badge');
  if (!listEl || !badgeEl) return;

  try {
    const data = await API.getMembers();
    const members = data.members || [];
    const yourEmail = data.yourEmail;
    const youAreAdmin = members.find(m => m.email === yourEmail)?.role === 'admin';

    badgeEl.textContent = `${members.length} / ${data.maxMembers}`;

    if (members.length === 0) {
      listEl.innerHTML = '<p class="text-sm" style="color: var(--color-text-muted);">Sin miembros</p>';
      return;
    }

    listEl.innerHTML = members.map(m => {
      const isYou = m.email === yourEmail;
      const isAdmin = m.role === 'admin';
      return `
        <div class="flex items-center justify-between p-3 rounded-lg" style="background: var(--color-bg-2);">
          <div class="flex items-center gap-3 min-w-0 flex-1">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0"
                 style="background: ${isAdmin ? 'var(--color-primary)' : 'var(--color-accent)'};">
              ${escapeHtml(m.email.charAt(0).toUpperCase())}
            </div>
            <div class="min-w-0 flex-1">
              <p class="text-sm font-semibold truncate">${escapeHtml(m.email)}${isYou ? ' (vos)' : ''}</p>
              <p class="text-xs" style="color: var(--color-text-muted);">
                ${isAdmin ? '👑 Administrador' : 'Miembro'}
                ${m.joinedAt ? ' · Se unió ' + new Date(m.joinedAt).toLocaleDateString('es-CL') : ''}
              </p>
            </div>
          </div>
          ${youAreAdmin && !isYou && !isAdmin ? `
            <button data-action="remove-member" data-email="${escapeHtml(m.email)}"
                    class="btn btn-ghost p-2" title="Quitar del hogar"
                    style="color: var(--color-danger);">
              <i data-lucide="user-x" class="w-4 h-4"></i>
            </button>
          ` : ''}
        </div>
      `;
    }).join('');

    if (window.lucide) lucide.createIcons();

    // Bindear nuevos botones (importante: el contenido se cargó async después del render inicial)
    listEl.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', handleAppAction);
    });
  } catch (err) {
    listEl.innerHTML = `<p class="text-sm" style="color: var(--color-danger);">Error: ${escapeHtml(err.message)}</p>`;
  }
}

async function loadAndRenderInvites() {
  const el = document.getElementById('invites-list');
  if (!el) return;
  try {
    const data = await API.listInvites();
    const active = (data.invites || []).filter(i => !i.usedAt && (!i.expiresAt || i.expiresAt > Date.now()));
    if (active.length === 0) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = `
      <div class="border-t pt-3 mt-3" style="border-color: var(--color-border);">
        <p class="text-xs font-semibold mb-2" style="color: var(--color-text-muted);">
          INVITACIONES PENDIENTES
        </p>
        ${active.map(inv => {
          const days = Math.max(0, Math.ceil((inv.expiresAt - Date.now()) / (1000 * 60 * 60 * 24)));
          return `
            <div class="flex items-center justify-between p-3 rounded-lg mb-2"
                 style="background: var(--color-warning-soft);">
              <div class="min-w-0 flex-1">
                <p class="font-mono text-sm font-bold tracking-wider" style="color: var(--color-warning);">
                  ${escapeHtml(inv.code)}
                </p>
                <p class="text-xs" style="color: var(--color-text-muted);">
                  Expira en ${days} ${days === 1 ? 'día' : 'días'}
                </p>
              </div>
              <div class="flex gap-1">
                <button data-action="copy-invite" data-code="${escapeHtml(inv.code)}"
                        class="btn btn-ghost p-2" title="Copiar código">
                  <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
                <button data-action="revoke-invite" data-code="${escapeHtml(inv.code)}"
                        class="btn btn-ghost p-2" title="Cancelar invitación"
                        style="color: var(--color-danger);">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    if (window.lucide) lucide.createIcons();

    // Bindear nuevos botones (importante: contenido async)
    el.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', handleAppAction);
    });
  } catch (err) {
    // silencioso
  }
}

async function createInvite() {
  try {
    const result = await API.createInvite();
    showToast(`✓ Código creado: ${result.code}`, 'success');

    // Intentar copiar al clipboard
    if (navigator.clipboard) {
      try {
        await navigator.clipboard.writeText(result.code);
        showToast('✓ Código copiado al portapapeles', 'success');
      } catch (e) { /* ignore */ }
    }

    await loadAndRenderInvites();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function copyInvite(code) {
  if (!navigator.clipboard) {
    showToast('No se pudo copiar (navegador antiguo)', 'error');
    return;
  }
  try {
    await navigator.clipboard.writeText(code);
    showToast('✓ Código copiado al portapapeles');
  } catch (e) {
    showToast('No se pudo copiar', 'error');
  }
}

async function revokeInvite(code) {
  if (!confirm2(`¿Cancelar la invitación ${code}? Quien tenga este código ya no podrá usarlo.`)) return;
  try {
    await API.revokeInvite(code);
    showToast('✓ Invitación cancelada');
    await loadAndRenderInvites();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function removeMember(email) {
  if (!confirm2(`¿Quitar a ${email} del hogar? Su cuenta será eliminada y perderá acceso. Los datos del hogar permanecen.`)) return;
  try {
    await API.removeMember(email);
    showToast('✓ Miembro removido');
    await loadAndRenderMembers();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function redeemInviteFromConfig() {
  const input = document.getElementById('redeem-code-input');
  if (!input) return;
  const code = input.value.trim().toUpperCase();
  if (!code) {
    showToast('Ingresa un código', 'error');
    return;
  }
  if (!/^INV-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(code)) {
    showToast('Formato de código inválido (debe ser INV-XXXX-XXXX)', 'error');
    return;
  }

  // Validar el código primero (sin abandonar nada todavía)
  let preview;
  try {
    preview = await API.previewInvite(code);
  } catch (err) {
    showToast('Código inválido: ' + err.message, 'error');
    return;
  }

  // Confirmar con el usuario
  const ok = confirm2(
    `Te vas a unir al hogar de ${preview.invitedBy}.\n\n` +
    `⚠️ ATENCIÓN: vas a abandonar tu hogar actual.\n` +
    `Si sos el único miembro, tu hogar se elimina permanentemente.\n\n` +
    `¿Continuar?`
  );
  if (!ok) return;

  try {
    showToast('Cambiando de hogar...', 'info');
    const result = await API.redeemInvite(code);

    // Actualizar sesión local con el nuevo token
    API.setSession(result.token, result.email);

    // Recargar todo desde cero con el nuevo hogar
    showToast('✓ Te uniste al hogar correctamente', 'success');

    // Limpiar input
    input.value = '';

    // Recargar app: detener polling, cargar nuevo state, reiniciar
    if (typeof pollingInterval !== 'undefined' && pollingInterval) {
      clearInterval(pollingInterval);
    }

    // Reset estado y recargar
    State.config = null;
    State.transactions = [];
    State.subscriptions = [];
    State.goals = [];
    State.version = 0;
    State.loaded = false;

    await State.loadFromAPI();
    startPolling();
    State.view = 'dashboard';
    render();

    setTimeout(() => {
      showToast('Bienvenido a tu nuevo hogar', 'success');
    }, 500);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

function bindConfig() {
  // Auto-save inputs de personas
  document.querySelectorAll('.cfg-person-name').forEach(el => {
    el.addEventListener('change', () => {
      const id = el.dataset.id;
      const p = State.config.persons.find(p => p.id === id);
      if (p) {
        p.name = el.value.trim() || p.name;
        State.saveConfig();
      }
    });
  });
  document.querySelectorAll('.cfg-person-income').forEach(el => {
    el.addEventListener('change', () => {
      const id = el.dataset.id;
      const p = State.config.persons.find(p => p.id === id);
      if (p) {
        p.income = parseFloat(el.value) || 0;
        State.saveConfig();
      }
    });
  });

  // Add category
  const catBtn = document.getElementById('cfg-add-cat');
  if (catBtn) {
    catBtn.addEventListener('click', () => {
      const v = document.getElementById('cfg-new-cat').value.trim();
      if (v && !State.config.categories.includes(v)) {
        State.config.categories.push(v);
        State.saveConfig();
        showToast('✓ Categoría agregada');
        render();
      }
    });
  }
  const catInput = document.getElementById('cfg-new-cat');
  if (catInput) {
    catInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('cfg-add-cat').click(); }
    });
  }

  // Add income category
  const incCatBtn = document.getElementById('cfg-add-income-cat');
  if (incCatBtn) {
    incCatBtn.addEventListener('click', () => {
      const v = document.getElementById('cfg-new-income-cat').value.trim();
      if (!State.config.incomeCategories) State.config.incomeCategories = [];
      if (v && !State.config.incomeCategories.includes(v)) {
        State.config.incomeCategories.push(v);
        State.saveConfig();
        showToast('✓ Categoría de ingreso agregada');
        render();
      }
    });
  }
  const incCatInput = document.getElementById('cfg-new-income-cat');
  if (incCatInput) {
    incCatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('cfg-add-income-cat').click(); }
    });
  }

  // Add method
  const methodBtn = document.getElementById('cfg-add-method');
  if (methodBtn) {
    methodBtn.addEventListener('click', () => {
      const v = document.getElementById('cfg-new-method').value.trim();
      if (v && !State.config.paymentMethods.includes(v)) {
        State.config.paymentMethods.push(v);
        State.saveConfig();
        showToast('✓ Medio agregado');
        render();
      }
    });
  }
  const methodInput = document.getElementById('cfg-new-method');
  if (methodInput) {
    methodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('cfg-add-method').click(); }
    });
  }
}

function addConfigPerson() {
  const name = prompt('Nombre de la persona:');
  if (!name || !name.trim()) return;
  const income = parseFloat(prompt('Ingreso mensual (CLP):', '0')) || 0;
  const usedColors = State.config.persons.map(p => p.color);
  const availableColor = PERSON_COLORS.find(c => !usedColors.includes(c.value)) || PERSON_COLORS[0];
  State.config.persons.push({
    id: uid('p'),
    name: name.trim(),
    income,
    color: availableColor.value
  });
  State.saveConfig();
  showToast('✓ Persona agregada');
  render();
}

function removeConfigPerson(id) {
  if (State.config.persons.length === 1) {
    showToast('Debe haber al menos una persona', 'error');
    return;
  }
  if (!confirm2('¿Eliminar esta persona? Sus gastos NO se borran.')) return;
  State.config.persons = State.config.persons.filter(p => p.id !== id);
  if (State.currentUser === id) {
    State.currentUser = State.config.persons[0].id;
    State.saveCurrentUser();
  }
  State.saveConfig();
  showToast('✓ Eliminada');
  render();
}

function removeConfigCategory(cat) {
  const used = State.transactions.filter(t => isExpenseTx(t) && t.category === cat);
  if (used.length > 0) {
    if (!confirm2(`Hay ${used.length} ${used.length === 1 ? 'gasto registrado' : 'gastos registrados'} con la categoría "${cat}". Los movimientos no se borran, pero la categoría dejará de aparecer en el formulario. ¿Continuar?`)) {
      return;
    }
  }
  State.config.categories = State.config.categories.filter(c => c !== cat);
  State.saveConfig();
  showToast('✓ Categoría eliminada');
  render();
}

function removeConfigMethod(method) {
  State.config.paymentMethods = State.config.paymentMethods.filter(m => m !== method);
  State.saveConfig();
  render();
}

function removeConfigIncomeCategory(cat) {
  if (!State.config.incomeCategories) return;
  // Avisar si hay transacciones asociadas
  const used = State.transactions.filter(t => isIncomeTx(t) && t.category === cat);
  if (used.length > 0) {
    if (!confirm2(`Hay ${used.length} ${used.length === 1 ? 'ingreso registrado' : 'ingresos registrados'} con la categoría "${cat}". Los movimientos no se borran, pero la categoría dejará de aparecer en el formulario. ¿Continuar?`)) {
      return;
    }
  }
  State.config.incomeCategories = State.config.incomeCategories.filter(c => c !== cat);
  State.saveConfig();
  showToast('✓ Categoría eliminada');
  render();
}

function exportData() {
  const data = {
    exported: new Date().toISOString(),
    config: State.config,
    transactions: State.transactions,
    subscriptions: State.subscriptions,
    goals: State.goals
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `finanzas_backup_${today()}.json`;
  a.click();
  showToast('✓ Backup descargado');
}

// =============================================================================
// EXPORT TO EXCEL (multi-sheet con formato profesional)
// =============================================================================
function exportToExcel() {
  if (typeof XLSX === 'undefined') {
    showToast('Error: librería Excel no cargada', 'error');
    return;
  }

  try {
    const wb = XLSX.utils.book_new();
    wb.Props = {
      Title: 'Finanzas Familiares',
      Subject: 'Reporte de Gastos',
      Author: 'Sistema Finanzas',
      CreatedDate: new Date()
    };

    const fechaGen = new Date().toLocaleDateString('es-CL');
    const horaGen = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

    // -------------------------------------------------------------------------
    // ESTILOS BASE (xlsx-style usa la propiedad .s en cada celda)
    // Nota: la versión community de SheetJS preserva tipos y formatos numéricos
    // (.t y .z) pero los estilos visuales completos requieren xlsx-js-style.
    // Aplicamos lo que sí funciona: formato de número, ancho de columnas,
    // merged cells, freeze panes, autofilter y tipos correctos.
    // -------------------------------------------------------------------------

    // Helper: aplica formato moneda CLP a columnas indicadas
    const applyMoneyFormat = (ws, columns, startRow = 2) => {
      Object.keys(ws).forEach(key => {
        if (key.startsWith('!')) return;
        const match = key.match(/^([A-Z]+)(\d+)$/);
        if (!match) return;
        const col = match[1];
        const row = parseInt(match[2]);
        if (columns.includes(col) && row >= startRow) {
          const cell = ws[key];
          if (typeof cell.v === 'number') {
            cell.t = 'n';
            cell.z = '"$"#,##0;[Red]"-$"#,##0';
          }
        }
      });
    };

    // Helper: aplica formato porcentaje
    const applyPercentText = (ws, columns, startRow = 2) => {
      // Los % los pasamos como string ya formateado, no requiere acción
    };

    // Helper: aplica formato fecha
    const applyDateFormat = (ws, columns, startRow = 2) => {
      Object.keys(ws).forEach(key => {
        if (key.startsWith('!')) return;
        const match = key.match(/^([A-Z]+)(\d+)$/);
        if (!match) return;
        const col = match[1];
        const row = parseInt(match[2]);
        if (columns.includes(col) && row >= startRow) {
          const cell = ws[key];
          if (typeof cell.v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(cell.v)) {
            // Convertir a date object
            const d = new Date(cell.v + 'T00:00:00');
            cell.v = d;
            cell.t = 'd';
            cell.z = 'dd-mm-yyyy';
          }
        }
      });
    };

    // =========================================================================
    // HOJA 1: RESUMEN
    // =========================================================================
    const totalIngresos = State.config.persons.reduce((s, p) => s + p.income, 0);
    const totalGastadoHistorico = State.transactions.reduce((s, t) => s + t.amount, 0);

    const currentMonth = monthKey(today());
    const txnsCurrent = State.transactions.filter(t => monthKey(t.date) === currentMonth);
    const gastoMes = txnsCurrent.reduce((s, t) => s + t.amount, 0);
    const balance = totalIngresos - gastoMes;
    const pctMes = totalIngresos > 0 ? (gastoMes / totalIngresos) * 100 : 0;

    const porCat = {};
    txnsCurrent.forEach(t => porCat[t.category] = (porCat[t.category] || 0) + t.amount);
    const catSorted = Object.entries(porCat).sort((a, b) => b[1] - a[1]);

    const porPersona = {};
    txnsCurrent.forEach(t => {
      const p = getPerson(t.personId);
      const name = p ? p.name : 'Otro';
      porPersona[name] = (porPersona[name] || 0) + t.amount;
    });
    const personSorted = Object.entries(porPersona).sort((a, b) => b[1] - a[1]);

    // Tendencia 6 meses
    const tendencia = [];
    const [y0, m0] = currentMonth.split('-').map(Number);
    for (let i = 5; i >= 0; i--) {
      const d = new Date(y0, m0 - 1 - i, 1);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const total = State.transactions.filter(t => monthKey(t.date) === k).reduce((s, t) => s + t.amount, 0);
      tendencia.push([monthLabel(k), total]);
    }

    const resumenData = [
      ['RESUMEN FINANCIERO'],
      [`Generado: ${fechaGen} ${horaGen}`],
      [],
      ['INGRESOS MENSUALES'],
      ['Persona', 'Ingreso Mensual'],
      ...State.config.persons.map(p => [p.name, p.income]),
      ['TOTAL', totalIngresos],
      [],
      [`GASTOS DEL MES (${monthLabel(currentMonth)})`],
      ['Concepto', 'Valor'],
      ['Total Gastado', gastoMes],
      ['Balance', balance],
      ['% Gastado del ingreso', `${pctMes.toFixed(1)}%`],
      ['Cantidad de movimientos', txnsCurrent.length],
      [],
      ['GASTOS POR CATEGORÍA (mes actual)'],
      ['Categoría', 'Monto', '% del Total'],
      ...catSorted.map(([cat, monto]) => [
        cat,
        monto,
        gastoMes > 0 ? `${((monto / gastoMes) * 100).toFixed(1)}%` : '0%'
      ]),
      [],
      ['GASTOS POR PERSONA (mes actual)'],
      ['Persona', 'Monto', '% del Total'],
      ...personSorted.map(([name, monto]) => [
        name,
        monto,
        gastoMes > 0 ? `${((monto / gastoMes) * 100).toFixed(1)}%` : '0%'
      ]),
      [],
      ['TENDENCIA ÚLTIMOS 6 MESES'],
      ['Mes', 'Total Gastado'],
      ...tendencia,
      [],
      ['HISTÓRICO TOTAL'],
      ['Total transacciones', State.transactions.length],
      ['Total gastado histórico', totalGastadoHistorico],
      ['Suscripciones activas', State.subscriptions.filter(s => s.active).length],
      ['Cuotas pendientes', State.transactions.filter(t => t.installmentInfo && new Date(t.date + 'T00:00:00') >= new Date()).length]
    ];

    const wsResumen = XLSX.utils.aoa_to_sheet(resumenData);
    wsResumen['!cols'] = [{ wch: 35 }, { wch: 18 }, { wch: 14 }];
    // Merge título principal
    wsResumen['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } }
    ];
    applyMoneyFormat(wsResumen, ['B'], 5);
    XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');

    // =========================================================================
    // HOJA 2: MOVIMIENTOS
    // =========================================================================
    const movHeader = [
      'Fecha', 'Tipo Mov', 'Persona', 'Categoría', 'Descripción', 'Monto',
      'Forma', 'Cuota', 'Medio de Pago', 'Notas', 'Registrado por'
    ];
    const movRows = State.transactions
      .slice()
      .sort((a, b) => b.date.localeCompare(a.date))
      .map(t => {
        const p = getPerson(t.personId);
        const creator = getPerson(t.createdBy);
        const kindLabel = isIncomeTx(t) ? 'Ingreso' : 'Gasto';
        const tipoLabel = t.type === 'unique' ? 'Único'
          : t.type === 'installment' ? 'Cuota'
          : t.type === 'subscription' ? 'Recurrente' : (t.type || '-');
        const cuotaLabel = t.installmentInfo
          ? `${t.installmentInfo.number}/${t.installmentInfo.total}` : '';
        return [
          t.date,
          kindLabel,
          p ? p.name : 'Otro',
          t.category,
          t.description,
          isIncomeTx(t) ? t.amount : -t.amount, // Negativo para gastos
          tipoLabel,
          cuotaLabel,
          t.paymentMethod || '',
          t.notes || '',
          creator ? creator.name : ''
        ];
      });

    const movTotalExpense = State.transactions.filter(isExpenseTx).reduce((s, t) => s + t.amount, 0);
    const movTotalIncome = State.transactions.filter(isIncomeTx).reduce((s, t) => s + t.amount, 0);
    const movTotal = movTotalIncome - movTotalExpense;

    const movData = movRows.length > 0
      ? [movHeader, ...movRows, [],
         ['', '', '', '', 'INGRESOS', movTotalIncome],
         ['', '', '', '', 'GASTOS', -movTotalExpense],
         ['', '', '', '', 'BALANCE', movTotal]]
      : [movHeader, ['Sin movimientos registrados']];

    const wsMov = XLSX.utils.aoa_to_sheet(movData);
    wsMov['!cols'] = [
      { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 16 }, { wch: 38 }, { wch: 14 },
      { wch: 12 }, { wch: 8 }, { wch: 18 }, { wch: 28 }, { wch: 14 }
    ];
    // Freeze first row + autofilter
    wsMov['!freeze'] = { xSplit: 0, ySplit: 1 };
    wsMov['!autofilter'] = { ref: `A1:K${movRows.length + 1}` };
    applyMoneyFormat(wsMov, ['F'], 2);
    applyDateFormat(wsMov, ['A'], 2);
    XLSX.utils.book_append_sheet(wb, wsMov, 'Movimientos');

    // =========================================================================
    // HOJA 3: CUOTAS
    // =========================================================================
    const groups = {};
    State.transactions.forEach(t => {
      if (t.installmentInfo?.groupId) {
        if (!groups[t.installmentInfo.groupId]) {
          groups[t.installmentInfo.groupId] = {
            firstDate: t.date,
            description: t.description,
            personId: t.personId,
            category: t.category,
            totalAmount: t.installmentInfo.totalAmount,
            totalInstallments: t.installmentInfo.total,
            installmentAmount: t.amount,
            items: []
          };
        }
        groups[t.installmentInfo.groupId].items.push(t);
        if (t.date < groups[t.installmentInfo.groupId].firstDate) {
          groups[t.installmentInfo.groupId].firstDate = t.date;
        }
      }
    });

    const now = new Date();
    const cuotasHeader = [
      'Inicio', 'Descripción', 'Persona', 'Categoría',
      'Monto Total', 'N° Cuotas', 'Monto Cuota',
      'Pagadas', 'Pendientes', 'Deuda Restante', '% Avance'
    ];
    const cuotasRows = Object.values(groups)
      .map(g => {
        const p = getPerson(g.personId);
        const paid = g.items.filter(i => new Date(i.date + 'T00:00:00') < now).length;
        const pending = g.items.length - paid;
        const debt = pending * g.installmentAmount;
        const progress = g.totalInstallments > 0 ? (paid / g.totalInstallments) * 100 : 0;
        return [
          g.firstDate,
          g.description,
          p ? p.name : 'Otro',
          g.category,
          g.totalAmount,
          g.totalInstallments,
          g.installmentAmount,
          paid,
          pending,
          debt,
          `${progress.toFixed(0)}%`
        ];
      })
      .sort((a, b) => b[0].localeCompare(a[0]));

    const totalDeuda = cuotasRows.reduce((s, r) => s + r[9], 0);
    const cuotasData = cuotasRows.length > 0
      ? [cuotasHeader, ...cuotasRows, [], ['', '', '', '', '', '', '', '', 'TOTAL DEUDA', totalDeuda]]
      : [cuotasHeader, ['', 'Sin compras a cuotas registradas']];

    const wsCuotas = XLSX.utils.aoa_to_sheet(cuotasData);
    wsCuotas['!cols'] = [
      { wch: 12 }, { wch: 30 }, { wch: 14 }, { wch: 16 },
      { wch: 14 }, { wch: 10 }, { wch: 14 },
      { wch: 10 }, { wch: 12 }, { wch: 16 }, { wch: 12 }
    ];
    if (cuotasRows.length > 0) {
      wsCuotas['!freeze'] = { xSplit: 0, ySplit: 1 };
      wsCuotas['!autofilter'] = { ref: `A1:K${cuotasRows.length + 1}` };
    }
    applyMoneyFormat(wsCuotas, ['E', 'G', 'J'], 2);
    applyDateFormat(wsCuotas, ['A'], 2);
    XLSX.utils.book_append_sheet(wb, wsCuotas, 'Cuotas');

    // =========================================================================
    // HOJA 4: SUSCRIPCIONES
    // =========================================================================
    const subsHeader = [
      'Nombre', 'Persona', 'Categoría',
      'Monto Mensual', 'Día Cobro', 'Estado', 'Total Anual Estimado'
    ];
    const subsRows = State.subscriptions.map(s => {
      const p = getPerson(s.personId);
      return [
        s.name,
        p ? p.name : 'Otro',
        s.category,
        s.amount,
        s.paymentDay,
        s.active ? 'Activa' : 'Pausada',
        s.amount * 12
      ];
    }).sort((a, b) => b[3] - a[3]);

    const totalMensual = State.subscriptions.filter(s => s.active).reduce((s, sub) => s + sub.amount, 0);
    const totalAnual = totalMensual * 12;

    const subsData = subsRows.length > 0
      ? [
          subsHeader,
          ...subsRows,
          [],
          ['', '', 'Total mensual (activas)', totalMensual],
          ['', '', 'Total anual estimado', '', '', '', totalAnual]
        ]
      : [subsHeader, ['Sin suscripciones registradas']];

    const wsSubs = XLSX.utils.aoa_to_sheet(subsData);
    wsSubs['!cols'] = [
      { wch: 22 }, { wch: 14 }, { wch: 18 },
      { wch: 16 }, { wch: 12 }, { wch: 12 }, { wch: 18 }
    ];
    if (subsRows.length > 0) {
      wsSubs['!freeze'] = { xSplit: 0, ySplit: 1 };
      wsSubs['!autofilter'] = { ref: `A1:G${subsRows.length + 1}` };
    }
    applyMoneyFormat(wsSubs, ['D', 'G'], 2);
    XLSX.utils.book_append_sheet(wb, wsSubs, 'Suscripciones');

    // =========================================================================
    // HOJA 5: CONFIGURACIÓN
    // =========================================================================
    const cfgData = [
      ['CONFIGURACIÓN DEL SISTEMA'],
      [`Generado: ${fechaGen} ${horaGen}`],
      [],
      ['PERSONAS'],
      ['Nombre', 'Ingreso Mensual', 'Color'],
      ...State.config.persons.map(p => [p.name, p.income, p.color]),
      ['', 'TOTAL', totalIngresos],
      [],
      ['CATEGORÍAS'],
      ['#', 'Nombre'],
      ...State.config.categories.map((c, i) => [i + 1, c]),
      [],
      ['MEDIOS DE PAGO'],
      ['#', 'Nombre'],
      ...State.config.paymentMethods.map((m, i) => [i + 1, m])
    ];

    const wsCfg = XLSX.utils.aoa_to_sheet(cfgData);
    wsCfg['!cols'] = [{ wch: 28 }, { wch: 22 }, { wch: 14 }];
    wsCfg['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } }
    ];
    applyMoneyFormat(wsCfg, ['B'], 5);
    XLSX.utils.book_append_sheet(wb, wsCfg, 'Configuración');

    // =========================================================================
    // ESCRIBIR ARCHIVO
    // =========================================================================
    const filename = `finanzas_${today()}.xlsx`;
    XLSX.writeFile(wb, filename);
    showToast('✓ Excel descargado');
  } catch (err) {
    console.error('Error exporting to Excel:', err);
    showToast('Error al exportar: ' + err.message, 'error');
  }
}

async function resetAllData() {
  if (!confirm2('⚠️ ATENCIÓN\n\nEsto borrará TODA la información en la nube:\n- Configuración\n- Transacciones\n- Suscripciones\n\n¿Continuar?')) return;
  if (!confirm2('¿Estás 100% seguro? Esta acción no se puede deshacer y afecta a TODOS los usuarios.')) return;
  State.config = null;
  State.transactions = [];
  State.subscriptions = [];
  State.goals = [];
  State.currentUser = null;
  Setup.step = 1;
  Setup.data = {
    persons: [],
    categories: [...DEFAULT_CATEGORIES],
    incomeCategories: [...DEFAULT_INCOME_CATEGORIES],
    paymentMethods: [...DEFAULT_PAYMENT_METHODS]
  };
  Setup.draftPerson = { name: '', income: '', color: PERSON_COLORS[0].value };

    await State.saveToAPI();
    showToast('Sistema reiniciado');
    render();
  } catch (err) {
    showToast('Error al reiniciar: ' + err.message, 'error');
  }
}

const Theme = {
  current: 'light',
  init() {
    // Cargar preferencia guardada o usar la del sistema
    const saved = localStorage.getItem('fin_theme');
    if (saved) {
      this.current = saved;
    } else {
      this.current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    this.apply();
  },
  apply() {
    document.documentElement.setAttribute('data-theme', this.current);
    // Actualizar theme-color del navegador
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', this.current === 'dark' ? '#0F1419' : '#0F4C5C');
    // Actualizar íconos del toggle
    setTimeout(() => {
      const lightIcons = document.querySelectorAll('.theme-icon-light');
      const darkIcons = document.querySelectorAll('.theme-icon-dark');
      lightIcons.forEach(i => i.style.display = this.current === 'dark' ? 'none' : 'block');
      darkIcons.forEach(i => i.style.display = this.current === 'dark' ? 'block' : 'none');
    }, 50);
  },
  toggle() {
    this.current = this.current === 'light' ? 'dark' : 'light';
    localStorage.setItem('fin_theme', this.current);
    this.apply();
    // Re-render charts con colores nuevos
    if (State.view === 'dashboard') render();
  }
};
Theme.init();

async function handleAuthSubmit() {
  AuthForm.error = null;
  const email = AuthForm.email.trim().toLowerCase();
  const password = AuthForm.password;
  const inviteCode = AuthForm.inviteCode.trim().toUpperCase();

  if (!email || !email.includes('@')) {
    AuthForm.error = 'Ingresá un email válido';
    renderAuth();
    return;
  }
  if (!password) {
    AuthForm.error = 'Ingresá tu contraseña';
    renderAuth();
    return;
  }

  if (AuthForm.mode === 'register' || AuthForm.mode === 'join') {
    if (password.length < 6) {
      AuthForm.error = 'La contraseña debe tener al menos 6 caracteres';
      renderAuth();
      return;
    }
    if (password !== AuthForm.passwordConfirm) {
      AuthForm.error = 'Las contraseñas no coinciden';
      renderAuth();
      return;
    }
  }

  if (AuthForm.mode === 'join' && !inviteCode) {
    AuthForm.error = 'Ingresá el código de invitación';
    renderAuth();
    return;
  }

  AuthForm.loading = true;
  renderAuth();

  try {
    let result;
    if (AuthForm.mode === 'login') {
      result = await API.login(email, password);
    } else {
      // register o join (ambos van al endpoint register, con o sin inviteCode)
      result = await API.register(email, password, AuthForm.mode === 'join' ? inviteCode : null);
    }

    API.setSession(result.token, result.email);

    if (result.migrated) {
      showToast('✓ Datos previos importados a tu cuenta', 'success');
    }
    if (result.joinedHogar) {
      showToast('✓ Te uniste al hogar', 'success');
    }

    AuthForm.email = '';
    AuthForm.password = '';
    AuthForm.passwordConfirm = '';
    AuthForm.inviteCode = '';
    AuthForm.invitePreview = null;
    AuthForm.loading = false;
    AuthForm.error = null;

    try {
      await State.loadFromAPI();
      startPolling();
      render();
    } catch (err) {
      AuthForm.error = 'Error cargando datos: ' + err.message;
      AuthForm.loading = false;
      API.clearSession();
      renderAuth();
    }
  } catch (err) {
    AuthForm.loading = false;
    AuthForm.error = err.message || 'Error desconocido';
    renderAuth();
  }
}

function renderLogin(errorMsg) {
  if (errorMsg) AuthForm.error = errorMsg;
  AuthForm.mode = 'login';
  AuthForm.loading = false;
  renderAuth();
}

// =============================================================================
// SYNC INDICATOR
// =============================================================================
function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const status = State.syncStatus;
  let html = '';
  if (status === 'saving') {
    html = `
      <div class="flex items-center gap-1.5 text-xs px-1.5 sm:px-2 py-1 rounded-md"
           style="background: var(--color-warning-soft); color: var(--color-warning);">
        <div class="animate-spin w-3 h-3 border-2 border-current border-t-transparent rounded-full"></div>
        <span class="hidden sm:inline">Guardando…</span>
      </div>`;
  } else if (status === 'loading') {
    html = `
      <div class="flex items-center gap-1.5 text-xs px-1.5 sm:px-2 py-1 rounded-md"
           style="background: var(--color-primary-soft); color: var(--color-primary);">
        <div class="animate-spin w-3 h-3 border-2 border-current border-t-transparent rounded-full"></div>
        <span class="hidden sm:inline">Sincronizando…</span>
      </div>`;
  } else if (status === 'error') {
    html = `
      <button data-action="retry-sync" class="flex items-center gap-1.5 text-xs px-1.5 sm:px-2 py-1 rounded-md"
           style="background: var(--color-danger-soft); color: var(--color-danger); cursor: pointer;"
           title="${escapeHtml(State.syncError || 'Error de conexión')}">
        <i data-lucide="alert-circle" class="w-3 h-3"></i>
        <span class="hidden sm:inline">Sin conexión</span>
      </button>`;
  } else {
    html = `
      <div class="flex items-center gap-1.5 text-xs px-1.5 sm:px-2 py-1 rounded-md"
           style="background: var(--color-success-soft); color: var(--color-success);">
        <div class="w-2 h-2 rounded-full" style="background: currentColor;"></div>
        <span class="hidden sm:inline">Sincronizado</span>
      </div>`;
  }
  el.innerHTML = html;
  if (window.lucide) lucide.createIcons();
  // Bind retry
  const retryBtn = el.querySelector('[data-action="retry-sync"]');
  if (retryBtn) retryBtn.addEventListener('click', () => State.saveToAPI());
}

// =============================================================================
// POLLING (cada 10s revisa si hay cambios remotos)
// =============================================================================
let pollingInterval = null;
function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(async () => {
    if (State.syncStatus === 'saving') return; // no pisar guardado
    try {
      const data = await API.fetchState();
      if ((data.version || 0) > State.version) {
        // Hay cambios remotos, recargar
        State.config = data.config;
        State.transactions = data.transactions || [];
        State.subscriptions = data.subscriptions || [];
        State.goals = data.goals || [];
        State.version = data.version || 0;
        State.updatedAt = data.updatedAt;
        State.updatedBy = data.updatedBy;
        const updaterName = State.updatedBy && State.config
          ? (State.config.persons.find(p => p.id === State.updatedBy)?.name || '')
          : '';
        if (updaterName && State.updatedBy !== State.currentUser) {
          showToast(`✓ Actualizado por ${updaterName}`);
        }
        render();
      }
    } catch (err) {
      if (err.status === 401) {
        // Token expiró, forzar re-login
        if (pollingInterval) clearInterval(pollingInterval);
        API.clearSession();
        AuthForm.error = 'Tu sesión expiró. Iniciá sesión de nuevo.';
        AuthForm.mode = 'login';
        renderAuth();
        return;
      }
      State.syncStatus = 'error';
      State.syncError = err.message;
      updateSyncIndicator();
    }
  }, 10000);
}

// =============================================================================
function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm2(`⚠️ Importar "${file.name}" REEMPLAZARÁ todos los datos actuales en la nube.\n\n¿Continuar?`)) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.config || !Array.isArray(data.transactions)) {
        showToast('Archivo no válido', 'error');
        return;
      }
      State.config = data.config;
      State.transactions = data.transactions;
      State.subscriptions = data.subscriptions || [];
      State.goals = data.goals || [];
      await State.saveToAPI();
      // Resetear current user
      if (State.config.persons[0]) {
        State.setCurrentUser(State.config.persons[0].id);
      }
      showToast('✓ Datos importados');
      render();
    } catch (err) {
      showToast('Error al importar: ' + err.message, 'error');
    }
  };
  input.click();
}

// =============================================================================
// LOGOUT
// =============================================================================
async function logout() {
  if (!confirm2('¿Cerrar sesión? Tendrás que iniciar sesión de nuevo. Tus datos en la nube NO se borran.')) return;
  if (pollingInterval) clearInterval(pollingInterval);
  await API.logoutServer();
  API.clearSession();
  State.config = null;
  State.transactions = [];
  State.subscriptions = [];
  State.goals = [];
  State.currentUser = null;
  State.version = 0;
  State.loaded = false;
  AuthForm.mode = 'login';
  AuthForm.email = '';
  AuthForm.password = '';
  AuthForm.passwordConfirm = '';
  AuthForm.error = null;
  AuthForm.successMsg = null;
  renderAuth();
}

// =============================================================================
// INIT
// =============================================================================
async function init() {
  const savedToken = API.loadSession();
  if (!savedToken) {
    renderAuth();
    return;
  }
  try {
    await State.loadFromAPI();
    startPolling();
    render();
  } catch (err) {
    if (err.status === 401) {
      API.clearSession();
      AuthForm.error = 'Tu sesión expiró. Iniciá sesión de nuevo.';
      renderAuth();
    } else {
      AuthForm.error = 'Error de conexión: ' + err.message;
      renderAuth();
    }
  }
}

init();
</script>
