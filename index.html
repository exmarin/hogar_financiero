<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#0F4C5C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1419" media="(prefers-color-scheme: dark)">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230F4C5C'/%3E%3Cpath d='M48 76c0-6.6 5.4-12 12-12h72c6.6 0 12 5.4 12 12v40c0 6.6-5.4 12-12 12H60c-6.6 0-12-5.4-12-12V76z' fill='%23C8A45C'/%3E%3Ccircle cx='128' cy='96' r='8' fill='%230F4C5C'/%3E%3C/svg%3E">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230F4C5C'/%3E%3Cpath d='M48 76c0-6.6 5.4-12 12-12h72c6.6 0 12 5.4 12 12v40c0 6.6-5.4 12-12 12H60c-6.6 0-12-5.4-12-12V76z' fill='%23C8A45C'/%3E%3Ccircle cx='128' cy='96' r='8' fill='%230F4C5C'/%3E%3C/svg%3E">
<title>Finanzas — Gestor de Gastos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #FAF8F5;
    --color-bg-2: #F4EFE6;
    --color-surface: #FFFFFF;
    --color-primary: #0F4C5C;
    --color-primary-hover: #0A3845;
    --color-primary-soft: #E6F0F2;
    --color-accent: #C8A45C;
    --color-accent-soft: #F7EDD4;
    --color-text: #1A1A1A;
    --color-text-muted: #6B6B6B;
    --color-text-subtle: #9A9A9A;
    --color-border: #E8E2D8;
    --color-border-strong: #D6CCBC;
    --color-success: #2D6A4F;
    --color-success-soft: #E0EFE6;
    --color-danger: #C1502E;
    --color-danger-soft: #FCE8DC;
    --color-warning: #D08C32;
    --color-warning-soft: #FAEDD3;
  }
  [data-theme="dark"] {
    --color-bg: #0F1419;
    --color-bg-2: #1A1F26;
    --color-surface: #1F252E;
    --color-primary: #5EEAD4;
    --color-primary-hover: #99F6E4;
    --color-primary-soft: #134E4A;
    --color-accent: #FBBF24;
    --color-accent-soft: #422006;
    --color-text: #F5F5F4;
    --color-text-muted: #A8A29E;
    --color-text-subtle: #78716C;
    --color-border: #2A323D;
    --color-border-strong: #3F4754;
    --color-success: #4ADE80;
    --color-success-soft: #14532D;
    --color-danger: #FB7185;
    --color-danger-soft: #7F1D1D;
    --color-warning: #FBBF24;
    --color-warning-soft: #78350F;
  }
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .card, .input, .btn-secondary, .toast {
    transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
  }
  * { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .font-display {
    font-family: 'Fraunces', serif;
    font-feature-settings: 'ss01', 'ss02';
    letter-spacing: -0.02em;
  }
  .number {
    font-variant-numeric: tabular-nums;
  }
  /* Subtle texture */
  .texture-paper {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(15,76,92,0.04) 1px, transparent 0);
    background-size: 24px 24px;
  }
  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-text-subtle); }

  /* Inputs */
  .input {
    width: 100%;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--color-text);
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(15,76,92,0.08);
  }
  .input-lg {
    font-size: 24px;
    font-weight: 600;
    padding: 14px 16px;
    font-family: 'Fraunces', serif;
    letter-spacing: -0.02em;
  }
  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.15s ease;
    cursor: pointer;
    border: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--color-primary);
    color: white;
  }
  .btn-primary:hover { background: var(--color-primary-hover); }
  .btn-primary:disabled {
    background: var(--color-border-strong);
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--color-surface);
    color: var(--color-text);
    border: 1px solid var(--color-border);
  }
  .btn-secondary:hover { background: var(--color-bg-2); }
  .btn-ghost {
    background: transparent;
    color: var(--color-text-muted);
  }
  .btn-ghost:hover {
    background: var(--color-bg-2);
    color: var(--color-text);
  }
  .btn-danger {
    background: var(--color-danger-soft);
    color: var(--color-danger);
  }
  .btn-danger:hover {
    background: var(--color-danger);
    color: white;
  }

  /* Cards */
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 16px;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in { animation: fadeIn 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .animate-spin { animation: spin 0.8s linear infinite; }

  /* Tabs */
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    color: var(--color-text-muted);
    border-bottom: 2px solid transparent;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .tab:hover { color: var(--color-text); }
  .tab.active {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
    font-weight: 600;
  }
  @media (max-width: 640px) {
    .tab {
      padding: 10px 10px;
      font-size: 12px;
      gap: 4px;
    }
    .tab i {
      width: 16px;
      height: 16px;
    }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 100;
    animation: slideUp 0.3s ease;
  }

  /* Person color chip */
  .color-chip {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s ease;
  }
  .color-chip.selected {
    border-color: var(--color-text);
    transform: scale(1.1);
  }

  /* Mobile niceties */
  @media (max-width: 640px) {
    .input-lg { font-size: 20px; }
    body {
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Touch targets más grandes */
    .btn { min-height: 40px; }
    /* Reducir gaps en grids */
    .card h3 { font-size: 1rem; }
    /* Selector de mes con tap target más grande */
    select, input[type="date"], input[type="number"], input[type="text"], textarea {
      font-size: 16px !important; /* Evita zoom automático en iOS */
    }
  }

  /* Bottom Navigation (solo móvil) */
  .bottom-nav { display: none; }
  .top-tabs { display: flex; }

  @media (max-width: 640px) {
    .top-tabs { display: none; }
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
    }
    main {
      padding-bottom: 90px !important;
    }
  }

  /* Bottom Navigation (móvil tipo app nativa) */
  .bottom-nav {
    display: none;
  }
  @media (max-width: 768px) {
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      padding: 4px 4px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom));
      justify-content: space-around;
      align-items: flex-end;
      z-index: 40;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .top-tabs {
      display: none !important;
    }
  }
  .bottom-nav-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 8px 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-muted);
    cursor: pointer;
    flex: 1;
    text-align: center;
    background: none;
    border: none;
    border-radius: 8px;
    transition: color 0.15s ease;
    min-width: 0;
    line-height: 1.1;
  }
  .bottom-nav-tab.active {
    color: var(--color-primary);
  }
  .bottom-nav-tab i {
    width: 22px !important;
    height: 22px !important;
  }
  .bottom-nav-tab.fab {
    background: var(--color-primary);
    color: white !important;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    margin: 0 4px;
    margin-top: -16px;
    flex: 0 0 56px;
    padding: 0;
    box-shadow: 0 4px 12px rgba(15,76,92,0.4);
    align-self: center;
  }
  .bottom-nav-tab.fab i {
    width: 28px !important;
    height: 28px !important;
  }
  .bottom-nav-tab.fab span {
    display: none;
  }

  /* More menu (bottom sheet) */
  .more-menu-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
    animation: fadeIn 0.2s ease;
  }
  .more-menu-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 16px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    z-index: 51;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    max-height: 80vh;
    overflow-y: auto;
  }
  .more-menu-handle {
    width: 40px;
    height: 4px;
    background: var(--color-border-strong);
    border-radius: 2px;
    margin: -12px auto 16px;
  }
  .more-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 12px;
    border-radius: 12px;
    background: transparent;
    border: none;
    text-align: left;
    color: var(--color-text);
    cursor: pointer;
    transition: background 0.15s ease;
    font-size: 15px;
    font-weight: 500;
  }
  .more-menu-item:hover {
    background: var(--color-bg-2);
  }
  .more-menu-item.active {
    background: var(--color-primary-soft);
    color: var(--color-primary);
  }
  .more-menu-item i {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// =============================================================================
// CONSTANTS
// =============================================================================
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const PERSON_COLORS = [
  { name: 'Teal', value: '#0F4C5C' },
  { name: 'Burgundy', value: '#9D2933' },
  { name: 'Gold', value: '#C8A45C' },
  { name: 'Forest', value: '#2D6A4F' },
  { name: 'Plum', value: '#6B3465' },
  { name: 'Rust', value: '#C1502E' },
  { name: 'Navy', value: '#1E3A5F' },
  { name: 'Olive', value: '#6B7B3D' }
];

const CHART_COLORS = ['#0F4C5C', '#C8A45C', '#9D2933', '#2D6A4F', '#6B3465', '#C1502E', '#1E3A5F', '#6B7B3D', '#D08C32', '#5C7A89'];

const DEFAULT_CATEGORIES = [
  'Alimentación',
  'Transporte',
  'Suscripciones',
  'Compras',
  'Servicios',
  'Salud',
  'Educación',
  'Entretenimiento',
  'Vivienda',
  'Otros'
];

const DEFAULT_PAYMENT_METHODS = [
  'Tarjeta de Crédito',
  'Tarjeta de Débito',
  'Efectivo',
  'Transferencia'
];

// =============================================================================
// API CLIENT (con auth por clave compartida)
// =============================================================================
const API = {
  appKey: null,
  baseURL: '/api',

  setAppKey(key) {
    this.appKey = key;
    localStorage.setItem('fin_app_key', key);
  },
  loadAppKey() {
    this.appKey = localStorage.getItem('fin_app_key');
    return this.appKey;
  },
  clearAppKey() {
    this.appKey = null;
    localStorage.removeItem('fin_app_key');
  },

  async fetchState() {
    const res = await fetch(`${this.baseURL}/state`, {
      headers: { 'X-App-Key': this.appKey || '' }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const e = new Error(err.error || `HTTP ${res.status}`);
      e.status = res.status;
      throw e;
    }
    return res.json();
  },

  async saveState(payload) {
    const res = await fetch(`${this.baseURL}/state`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-App-Key': this.appKey || ''
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const e = new Error(err.error || `HTTP ${res.status}`);
      e.status = res.status;
      throw e;
    }
    return res.json();
  }
};

// Local cache solo para guardar el currentUser (preferencia personal por dispositivo)
const Storage = {
  get(key) {
    try {
      const raw = localStorage.getItem(`fin_${key}`);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  set(key, value) {
    try {
      localStorage.setItem(`fin_${key}`, JSON.stringify(value));
    } catch (e) {}
  }
};

// =============================================================================
// STATE
// =============================================================================
const State = {
  config: null,
  transactions: [],
  subscriptions: [],
  goals: [],
  currentUser: null,
  view: 'dashboard',
  selectedMonth: null,
  filters: { person: 'all', category: 'all', search: '' },
  version: 0,
  updatedAt: null,
  updatedBy: null,
  syncStatus: 'idle', // idle | loading | saving | error | offline
  syncError: null,
  loaded: false,

  async loadFromAPI() {
    try {
      this.syncStatus = 'loading';
      const data = await API.fetchState();
      this.config = data.config;
      this.transactions = data.transactions || [];
      this.subscriptions = data.subscriptions || [];
      this.goals = data.goals || [];
      this.version = data.version || 0;
      this.updatedAt = data.updatedAt;
      this.updatedBy = data.updatedBy;
      this.syncStatus = 'idle';
      this.loaded = true;

      // Restaurar preferencia local del usuario actual
      const localUser = Storage.get('currentUser');
      if (this.config && this.config.persons.length > 0) {
        if (localUser && this.config.persons.find(p => p.id === localUser)) {
          this.currentUser = localUser;
        } else {
          this.currentUser = this.config.persons[0].id;
        }
      }
      if (!this.selectedMonth) this.selectedMonth = monthKey(today());
      return true;
    } catch (err) {
      this.syncStatus = 'error';
      this.syncError = err.message;
      this.loaded = true;
      throw err;
    }
  },

  async saveToAPI() {
    try {
      this.syncStatus = 'saving';
      updateSyncIndicator();
      const result = await API.saveState({
        config: this.config,
        transactions: this.transactions,
        subscriptions: this.subscriptions,
        goals: this.goals,
        version: this.version,
        updatedBy: this.currentUser
      });
      this.version = result.version;
      this.updatedAt = result.updatedAt;
      this.syncStatus = 'idle';
      this.syncError = null;
      updateSyncIndicator();
      return true;
    } catch (err) {
      this.syncStatus = 'error';
      this.syncError = err.message;
      updateSyncIndicator();
      showToast('Error al guardar: ' + err.message, 'error');
      throw err;
    }
  },

  setCurrentUser(id) {
    this.currentUser = id;
    Storage.set('currentUser', id);
  },

  // Aliases retrocompatibles — todos llaman a saveToAPI (fire-and-forget)
  saveConfig() { this.saveToAPI(); },
  saveTransactions() { this.saveToAPI(); },
  saveSubscriptions() { this.saveToAPI(); },
  saveCurrentUser() { Storage.set('currentUser', this.currentUser); }
};

// =============================================================================
// HELPERS
// =============================================================================
function uid(prefix = 'id') {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
}
function fmt(amount) {
  if (amount === null || amount === undefined || isNaN(amount)) return '$0';
  const n = Math.round(amount);
  return '$' + n.toLocaleString('es-CL');
}
function today() {
  return new Date().toISOString().split('T')[0];
}
function monthKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function monthLabel(key) {
  const [y, m] = key.split('-');
  return `${MONTHS[parseInt(m) - 1]} ${y}`;
}
function addMonths(dateStr, months) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + months);
  return d.toISOString().split('T')[0];
}
function getPerson(id) {
  if (!State.config) return null;
  if (id === 'shared') return { id: 'shared', name: 'Compartido', color: '#9A9A9A', income: 0 };
  return State.config.persons.find(p => p.id === id) || null;
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}
function showToast(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = 'toast';
  div.style.background = type === 'success' ? 'var(--color-success)' : 'var(--color-danger)';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2800);
}
function confirm2(msg) {
  return window.confirm(msg);
}

// =============================================================================
// RENDER ROOT
// =============================================================================
function render() {
  const root = document.getElementById('app');
  if (!State.config || State.config.persons.length === 0) {
    root.innerHTML = renderSetup();
    bindSetup();
  } else {
    root.innerHTML = renderApp();
    bindApp();
    updateSyncIndicator();
  }
  // Render Lucide icons
  if (window.lucide) lucide.createIcons();
}

// =============================================================================
// SETUP WIZARD
// =============================================================================
const Setup = {
  step: 1,
  data: {
    persons: [],
    categories: [...DEFAULT_CATEGORIES],
    paymentMethods: [...DEFAULT_PAYMENT_METHODS]
  },
  draftPerson: { name: '', income: '', color: PERSON_COLORS[0].value }
};

function renderSetup() {
  return `
    <div class="min-h-screen flex items-center justify-center p-4 texture-paper">
      <div class="w-full max-w-2xl animate-slide-up">
        <!-- Logo -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: var(--color-primary);">
            <i data-lucide="wallet" class="w-8 h-8 text-white"></i>
          </div>

function bindSetup() {
  // Inputs
  const nameInput = document.getElementById('setup-person-name');
  if (nameInput) {
    nameInput.addEventListener('input', e => Setup.draftPerson.name = e.target.value);
  }
  const incomeInput = document.getElementById('setup-person-income');
  if (incomeInput) {
    incomeInput.addEventListener('input', e => Setup.draftPerson.income = e.target.value);
  }
  const newCatInput = document.getElementById('setup-new-category');
  if (newCatInput) {
    newCatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addCategoryFromInput();
      }
    });
  }
  const newMethodInput = document.getElementById('setup-new-method');
  if (newMethodInput) {
    newMethodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addMethodFromInput();
      }
    });
  }
  const addPersonBtn = document.getElementById('setup-add-person');
  if (addPersonBtn) {
    addPersonBtn.addEventListener('click', addPersonFromForm);
  }

  // Action delegation
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleSetupAction);
  });
}

function handleSetupAction(e) {
  const action = e.currentTarget.dataset.action;
  const idx = parseInt(e.currentTarget.dataset.idx);

  switch (action) {
    case 'select-color':
      Setup.draftPerson.color = e.currentTarget.dataset.color;
      render();
      break;
    case 'remove-person':
      Setup.data.persons.splice(idx, 1);
      render();
      break;
    case 'add-category':
      addCategoryFromInput();
      break;
    case 'remove-category':
      Setup.data.categories.splice(idx, 1);
      render();
      break;
    case 'add-method':
      addMethodFromInput();
      break;
    case 'remove-method':
      Setup.data.paymentMethods.splice(idx, 1);
      render();
      break;
    case 'setup-next':
      Setup.step = Math.min(Setup.step + 1, 3);
      render();
      break;
    case 'setup-back':
      Setup.step = Math.max(Setup.step - 1, 1);
      render();
      break;
    case 'setup-finish':
      finishSetup();
      break;
  }
}

function addPersonFromForm() {
  const name = Setup.draftPerson.name.trim();
  if (!name) {
    showToast('Ingresa un nombre', 'error');
    return;
  }
  const income = parseFloat(Setup.draftPerson.income) || 0;
  Setup.data.persons.push({
    id: uid('p'),
    name,
    income,
    color: Setup.draftPerson.color
  });
  Setup.draftPerson = {
    name: '',
    income: '',
    color: PERSON_COLORS[(Setup.data.persons.length) % PERSON_COLORS.length].value
  };
  render();
}

function addCategoryFromInput() {
  const input = document.getElementById('setup-new-category');
  if (!input) return;
  const v = input.value.trim();
  if (v && !Setup.data.categories.includes(v)) {
    Setup.data.categories.push(v);
    input.value = '';
    render();
  }
}

function addMethodFromInput() {
  const input = document.getElementById('setup-new-method');
  if (!input) return;
  const v = input.value.trim();
  if (v && !Setup.data.paymentMethods.includes(v)) {
    Setup.data.paymentMethods.push(v);
    input.value = '';
    render();
  }
}

async function finishSetup() {
  State.config = {
    persons: Setup.data.persons,
    categories: Setup.data.categories,
    paymentMethods: Setup.data.paymentMethods,
    createdAt: new Date().toISOString()
  };
  State.setCurrentUser(State.config.persons[0].id);
  try {
    await State.saveToAPI();
    showToast('✓ Sistema listo');
    render();
  } catch (err) {
    showToast('Error guardando configuración', 'error');
  }
}

function bindApp() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAppAction);
  });

  // Specific bindings per view
  if (State.view === 'register') bindRegister();
  if (State.view === 'transactions') bindTransactions();
  if (State.view === 'subscriptions') bindSubscriptions();
  if (State.view === 'goals') bindGoals();
  if (State.view === 'config') bindConfig();
  if (State.view === 'dashboard') renderDashboardCharts();

  // Click outside user menu
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('user-menu');
    if (!menu) return;
    if (!e.target.closest('[data-action="toggle-user-menu"]') && !menu.contains(e.target)) {
      menu.classList.add('hidden');
    }
  });
}

function handleAppAction(e) {
  const action = e.currentTarget.dataset.action;
  const ds = e.currentTarget.dataset;

  switch (action) {
    case 'switch-view':
      State.view = ds.view;
      render();
      break;
    case 'switch-view-close':
      // Cierra el more-menu y cambia de vista
      State.view = ds.view;
      render();
      break;
    case 'open-more-menu':
      e.stopPropagation();
      document.getElementById('more-menu-overlay')?.classList.remove('hidden');
      break;
    case 'close-more-menu':
      document.getElementById('more-menu-overlay')?.classList.add('hidden');
      break;
    case 'toggle-user-menu':
      e.stopPropagation();
      document.getElementById('user-menu').classList.toggle('hidden');
      break;
    case 'switch-user':
      State.setCurrentUser(ds.id);
      render();
      break;
    case 'change-month':
      changeMonth(parseInt(ds.delta));
      break;
    case 'delete-tx':
      deleteTransaction(ds.id);
      break;
    case 'delete-sub':
      deleteSubscription(ds.id);
      break;
    case 'toggle-sub':
      toggleSubscription(ds.id);
      break;
    case 'generate-sub-month':
      generateSubscriptionMonth(ds.id);
      break;
    case 'remove-config-person':
      removeConfigPerson(ds.id);
      break;
    case 'remove-config-category':
      removeConfigCategory(ds.cat);
      break;
    case 'remove-config-method':
      removeConfigMethod(ds.method);
      break;
    case 'export-data':
      exportData();
      break;
    case 'export-excel':
      exportToExcel();
      break;
    case 'import-json':
      importJSON();
      break;
    case 'logout':
      logout();
      break;
    case 'toggle-theme':
      Theme.toggle();
      break;
    case 'edit-goal':
      editGoal(ds.id);
      break;
    case 'delete-goal':
      deleteGoal(ds.id);
      break;
    case 'add-goal-saving':
      addGoalSaving(ds.id);
      break;
    case 'reset-data':
      resetAllData();
      break;
    case 'add-config-person':
      addConfigPerson();
      break;
  }
}

function renderDashboard() {
  const txns = State.transactions.filter(t => monthKey(t.date) === State.selectedMonth);
  const totalSpent = txns.reduce((s, t) => s + t.amount, 0);
  const totalIncome = State.config.persons.reduce((s, p) => s + p.income, 0);
  const balance = totalIncome - totalSpent;
  const pct = totalIncome > 0 ? (totalSpent / totalIncome) * 100 : 0;
  const balanceColor = balance >= 0 ? 'success' : 'danger';
  const pctColor = pct < 70 ? 'success' : pct < 90 ? 'warning' : 'danger';

  // Próximas cuotas (próximos 30 días)
  const now = new Date();
  const in30 = new Date();
  in30.setDate(in30.getDate() + 30);
  const upcoming = State.transactions
    .filter(t => t.installmentInfo)
    .filter(t => {
      const d = new Date(t.date + 'T00:00:00');
      return d >= now && d <= in30;
    })
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  // Alertas: cuotas en próximos 7 días
  const in7days = new Date();
  in7days.setDate(in7days.getDate() + 7);
  const today_d = new Date();
  today_d.setHours(0, 0, 0, 0);
  const upcomingAlert = State.transactions
    .filter(t => t.installmentInfo)
    .filter(t => {
      const d = new Date(t.date + 'T00:00:00');
      return d >= today_d && d <= in7days;
    });
  const upcomingAlertTotal = upcomingAlert.reduce((s, t) => s + t.amount, 0);

  return `
    <div class="space-y-3 sm:space-y-4">
      ${upcomingAlert.length > 0 ? `
        <div class="rounded-xl p-4 border-l-4 flex items-start gap-3"
             style="background: var(--color-warning-soft); border-left-color: var(--color-warning);">
          <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5" style="color: var(--color-warning);"></i>
          <div class="flex-1">
            <p class="font-semibold" style="color: var(--color-warning);">
              ${upcomingAlert.length} ${upcomingAlert.length === 1 ? 'cuota' : 'cuotas'} en los próximos 7 días
            </p>
            <p class="text-sm" style="color: var(--color-text-muted);">
              Total a pagar: <strong class="number">${fmt(upcomingAlertTotal)}</strong>
            </p>
          </div>
          <button data-action="switch-view" data-view="installments" class="btn btn-secondary text-xs">
            Ver detalle
          </button>
        </div>
      ` : ''}

      <!-- Month selector -->
      <div class="card p-3 flex items-center justify-between">
        <button data-action="change-month" data-delta="-1" class="btn btn-ghost p-2">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <h2 class="font-display text-xl font-bold">${monthLabel(State.selectedMonth)}</h2>
        <button data-action="change-month" data-delta="1" class="btn btn-ghost p-2">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- KPIs -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
        ${kpiCard('Ingresos', fmt(totalIncome), 'arrow-down-right', 'success')}
        ${kpiCard('Gastado', fmt(totalSpent), 'arrow-up-right', 'danger')}
        ${kpiCard('Balance', fmt(balance), 'dollar-sign', balanceColor)}
        ${kpiCard('% Gastado', `${pct.toFixed(1)}%`, 'trending-up', pctColor)}
      </div>

      <!-- Progress bar -->
      ${totalIncome > 0 ? `
        <div class="card p-4">
          <div class="flex justify-between text-sm mb-2">
            <span style="color: var(--color-text-muted);">Presupuesto del mes</span>
            <span class="font-semibold number">${fmt(totalSpent)} / ${fmt(totalIncome)}</span>
          </div>
          <div class="h-3 rounded-full overflow-hidden" style="background: var(--color-border);">
            <div class="h-full transition-all" style="width: ${Math.min(pct, 100)}%; background: var(--color-${pctColor});"></div>
          </div>
        </div>
      ` : ''}

      <!-- Charts row -->
      ${txns.length > 0 ? `
        <div class="grid lg:grid-cols-2 gap-4">
          <div class="card p-4">
            <h3 class="font-semibold mb-4">Gastos por categoría</h3>
            <div class="relative" style="height: 240px;">
              <canvas id="chart-categories"></canvas>
            </div>
          </div>
          <div class="card p-4">
            <h3 class="font-semibold mb-4">Gastos por persona</h3>
            <div class="relative" style="height: 240px;">
              <canvas id="chart-persons"></canvas>
            </div>
          </div>
        </div>
      ` : `
        <div class="card p-8 text-center">
          <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
          <p style="color: var(--color-text-muted);">Aún no hay gastos registrados este mes</p>
          <button data-action="switch-view" data-view="register" class="btn btn-primary mt-4">
            <i data-lucide="plus" class="w-4 h-4"></i>
            Registrar primer gasto
          </button>
        </div>
      `}

      <!-- Trend -->
      ${State.transactions.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-4">Tendencia últimos 6 meses</h3>
          <div class="relative" style="height: 220px;">
            <canvas id="chart-trend"></canvas>
          </div>
        </div>
      ` : ''}

      <!-- Stats anuales -->
      <div class="card p-4">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i data-lucide="calendar" class="w-5 h-5" style="color: var(--color-primary);"></i>
          Resumen ${new Date().getFullYear()}
        </h3>
        ${(() => {
          const year = new Date().getFullYear();
          const yearTxns = State.transactions.filter(t => t.date.startsWith(year + '-'));
          const yearTotal = yearTxns.reduce((s, t) => s + t.amount, 0);
          const monthsWithData = new Set(yearTxns.map(t => monthKey(t.date))).size;
          const monthAvg = monthsWithData > 0 ? yearTotal / monthsWithData : 0;

          const prev = new Date(State.selectedMonth + '-01');
          prev.setMonth(prev.getMonth() - 1);
          const prevKey = `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, '0')}`;
          const prevMonthTotal = State.transactions
            .filter(t => monthKey(t.date) === prevKey)
            .reduce((s, t) => s + t.amount, 0);
          const diff = totalSpent - prevMonthTotal;
          const diffPct = prevMonthTotal > 0 ? ((diff / prevMonthTotal) * 100) : 0;

          return `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
              <div>
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Total año</p>

              <div>
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Promedio mes</p>
                <p class="font-display text-xl font-bold number">${fmt(monthAvg)}</p>
              </div>
              <div>
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Meses activos</p>
                <p class="font-display text-xl font-bold">${monthsWithData}/12</p>
              </div>
              <div>
                <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">vs mes ant.</p>
                <p class="font-display text-xl font-bold number"
                   style="color: ${diff > 0 ? 'var(--color-danger)' : diff < 0 ? 'var(--color-success)' : 'var(--color-text-muted)'};">
                  ${diff > 0 ? '↑' : diff < 0 ? '↓' : '='}
                  ${prevMonthTotal > 0 ? Math.abs(diffPct).toFixed(0) + '%' : '—'}
                </p>
              </div>
            </div>
          `;
        })()}
      </div>

      <!-- Upcoming -->
      ${upcoming.length > 0 ? `
        <div class="card p-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <i data-lucide="credit-card" class="w-5 h-5" style="color: var(--color-primary);"></i>

                    </p>
                  </div>
                  <span class="font-display font-bold number" style="color: var(--color-primary);">
                    ${fmt(t.amount)}
                  </span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function kpiCard(label, value, icon, color) {
  return `
    <div class="card p-3 sm:p-4">
      <div class="flex items-center justify-between mb-1.5 sm:mb-2">
        <span class="text-[10px] sm:text-xs uppercase tracking-wider truncate" style="color: var(--color-text-muted);">${label}</span>
        <div class="w-6 h-6 sm:w-7 sm:h-7 rounded-md flex items-center justify-center flex-shrink-0"
             style="background: var(--color-${color}-soft); color: var(--color-${color});">
          <i data-lucide="${icon}" class="w-3 h-3 sm:w-4 sm:h-4"></i>
        </div>
      </div>
      <p class="font-display text-lg sm:text-2xl font-bold number truncate">${value}</p>
    </div>
  `;
}

function changeMonth(delta) {
  const [y, m] = State.selectedMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  State.selectedMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  render();
}

function renderDashboardCharts() {
  const txns = State.transactions.filter(t => monthKey(t.date) === State.selectedMonth);
  if (txns.length === 0) return;

  // Categorías
  const byCat = {};
  txns.forEach(t => byCat[t.category] = (byCat[t.category] || 0) + t.amount);
  const catEntries = Object.entries(byCat).sort((a,b) => b[1] - a[1]);

  const ctxCat = document.getElementById('chart-categories');
  if (ctxCat) {
    new Chart(ctxCat, {
      type: 'doughnut',
      data: {
        labels: catEntries.map(e => e[0]),
        datasets: [{
          data: catEntries.map(e => e[1]),
          backgroundColor: catEntries.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]),
          borderWidth: 2,
          borderColor: '#FFFFFF'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'right',
            labels: { font: { family: 'DM Sans', size: 12 }, padding: 12, boxWidth: 12 }
          },
          tooltip: {
            callbacks: { label: (c) => ` ${c.label}: ${fmt(c.parsed)}` }
          }
        },
        cutout: '60%'
      }
    });
  }

  // Personas
  const byPerson = {};
  txns.forEach(t => {
    const p = getPerson(t.personId);
    const key = p ? p.name : 'Otro';
    byPerson[key] = (byPerson[key] || 0) + t.amount;
  });
  const personEntries = Object.entries(byPerson);
  const personColors = personEntries.map(([name]) => {
    const p = State.config.persons.find(pp => pp.name === name);
    return p ? p.color : '#9A9A9A';
  });

  const ctxP = document.getElementById('chart-persons');
  if (ctxP) {
    new Chart(ctxP, {
      type: 'bar',
      data: {
        labels: personEntries.map(e => e[0]),
        datasets: [{
          data: personEntries.map(e => e[1]),
          backgroundColor: personColors,
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => ` ${fmt(c.parsed.y)}` } }
        },
        scales: {
          y: { ticks: { callback: (v) => '$' + (v/1000).toFixed(0) + 'k', font: { family: 'DM Sans' } }, grid: { color: '#E8E2D8' } },
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans' } } }
        }
      }
    });
  }

  // Tendencia
  const trend = [];
  const [y0, m0] = State.selectedMonth.split('-').map(Number);
  for (let i = 5; i >= 0; i--) {
    const d = new Date(y0, m0 - 1 - i, 1);
    const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const total = State.transactions
      .filter(t => monthKey(t.date) === k)
      .reduce((s, t) => s + t.amount, 0);
    trend.push({ label: MONTHS_SHORT[d.getMonth()], total });
  }

  const ctxT = document.getElementById('chart-trend');
  if (ctxT) {
    new Chart(ctxT, {
      type: 'line',
      data: {
        labels: trend.map(t => t.label),
        datasets: [{
          data: trend.map(t => t.total),
          borderColor: '#0F4C5C',
          backgroundColor: 'rgba(15,76,92,0.1)',
          fill: true,
          tension: 0.35,
          pointRadius: 5,
          pointBackgroundColor: '#0F4C5C',
          pointBorderColor: '#FFFFFF',
          pointBorderWidth: 2,
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => ` ${fmt(c.parsed.y)}` } }
        },
        scales: {
          y: { ticks: { callback: (v) => '$' + (v/1000).toFixed(0) + 'k', font: { family: 'DM Sans' } }, grid: { color: '#E8E2D8' } },
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans' } } }
        }
      }
    });
  }
}

                         background: ${RegForm.type === 'unique' ? 'var(--color-primary-soft)' : 'var(--color-surface)'};">

              <select id="reg-category" class="input">
                ${State.config.categories.map(c => `<option ${RegForm.category === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}

function updateInstallmentPreview() {
  const amount = parseFloat(RegForm.amount) || 0;
  const total = parseInt(RegForm.totalInstallments) || 0;
  const monto = total > 0 ? amount / total : 0;
  const previewEl = document.getElementById('installment-preview');
  const amountEl = document.getElementById('installment-amount');
  const countEl = document.getElementById('installment-count');
  if (previewEl) previewEl.style.display = (amount > 0 && total > 0) ? 'block' : 'none';
  if (amountEl) amountEl.textContent = fmt(monto);
  if (countEl) countEl.textContent = total || '';
}

function bindRegister() {
  // Inputs
  ['reg-date', 'reg-person', 'reg-category', 'reg-method', 'reg-description', 'reg-amount', 'reg-installments', 'reg-notes']
    .forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', () => {
        if (id === 'reg-date') RegForm.date = el.value;
        if (id === 'reg-person') RegForm.personId = el.value;
        if (id === 'reg-category') RegForm.category = el.value;
        if (id === 'reg-method') RegForm.paymentMethod = el.value;
        if (id === 'reg-description') RegForm.description = el.value;
        if (id === 'reg-amount') {
          RegForm.amount = el.value;
          if (RegForm.type === 'installments') {
            updateInstallmentPreview();
          }
        }
        if (id === 'reg-installments') {
          RegForm.totalInstallments = el.value;
          updateInstallmentPreview();
        }
        if (id === 'reg-notes') RegForm.notes = el.value;
      });
    });

  // Form actions
  document.querySelectorAll('[data-form-action]').forEach(el => {
    el.addEventListener('click', e => {
      const a = e.currentTarget.dataset.formAction;
      if (a === 'set-type') {
        RegForm.type = e.currentTarget.dataset.type;
        render();
      }
      if (a === 'submit') submitRegister();
    });
  });
}

function submitRegister() {
  // Read latest values
  RegForm.date = document.getElementById('reg-date').value;
  RegForm.personId = document.getElementById('reg-person').value;
  RegForm.category = document.getElementById('reg-category').value;
  RegForm.paymentMethod = document.getElementById('reg-method').value;
  RegForm.description = document.getElementById('reg-description').value.trim();
  RegForm.amount = document.getElementById('reg-amount').value;
  RegForm.notes = document.getElementById('reg-notes').value;
  if (RegForm.type === 'installments') {
    RegForm.totalInstallments = document.getElementById('reg-installments').value;
  }

  if (!RegForm.description) {
    showToast('Ingresa una descripción', 'error');
    return;
  }
  const amt = parseFloat(RegForm.amount);
  if (!amt || amt <= 0) {
    showToast('Ingresa un monto válido', 'error');
    return;
  }

  if (RegForm.type === 'installments') {
    const total = parseInt(RegForm.totalInstallments);
    if (!total || total < 2) {
      showToast('Mínimo 2 cuotas', 'error');
      return;
    }
    const grupoId = uid('grp');
    const monto = Math.round(amt / total);
    for (let i = 0; i < total; i++) {
      State.transactions.push({
        id: uid('t'),
        date: addMonths(RegForm.date, i),
        personId: RegForm.personId,
        category: RegForm.category,
        description: RegForm.description,
        amount: monto,
        paymentMethod: RegForm.paymentMethod,
        notes: RegForm.notes,
        type: 'installment',
        installmentInfo: {
          groupId: grupoId,
          number: i + 1,
          total,
          totalAmount: amt
        },
        createdBy: State.currentUser,
        createdAt: new Date().toISOString()
      });
    }
    showToast(`✓ ${total} cuotas creadas`);
  } else {
    State.transactions.push({
      id: uid('t'),

function deleteTransaction(id) {
  const tx = State.transactions.find(t => t.id === id);
  if (!tx) return;
  if (tx.installmentInfo?.groupId) {
    if (confirm2('¿Borrar TODAS las cuotas de este gasto?\n\n[Aceptar] = Borrar todas\n[Cancelar] = Solo esta cuota')) {
      State.transactions = State.transactions.filter(t => t.installmentInfo?.groupId !== tx.installmentInfo.groupId);
    } else {
      State.transactions = State.transactions.filter(t => t.id !== id);
    }
  } else {
    if (!confirm2('¿Eliminar este gasto?')) return;
    State.transactions = State.transactions.filter(t => t.id !== id);
  }
  State.saveTransactions();
  showToast('✓ Eliminado');
  render();
}

function bindSubscriptions() {

      if (a === 'show-sub') {
        SubForm.reset();
        SubForm.show = true;
        render();
      }
      if (a === 'cancel-sub') {
        SubForm.show = false;
        render();
      }
      if (a === 'save-sub') saveSubscription();
    });
  });
}

function saveSubscription() {
  const name = document.getElementById('sub-name').value.trim();
  const amount = parseFloat(document.getElementById('sub-amount').value);
  const day = parseInt(document.getElementById('sub-day').value);
  const personId = document.getElementById('sub-person').value;
  const category = document.getElementById('sub-category').value;

  if (!name || !amount || amount <= 0) {
    showToast('Completa nombre y monto válido', 'error');
    return;
  }

  State.subscriptions.push({
    id: uid('s'),
    name, amount, personId, category,
    paymentDay: day || 1,
    active: true,
    createdAt: today()
  });
  State.saveSubscriptions();
  SubForm.reset();
  showToast('✓ Suscripción agregada');
  render();
}

function toggleSubscription(id) {
  State.subscriptions = State.subscriptions.map(s =>
    s.id === id ? { ...s, active: !s.active } : s
  );
  State.saveSubscriptions();
  render();
}

function deleteSubscription(id) {
  if (!confirm2('¿Eliminar esta suscripción?')) return;
  State.subscriptions = State.subscriptions.filter(s => s.id !== id);
  State.saveSubscriptions();
  showToast('✓ Eliminada');
  render();
}

function generateSubscriptionMonth(id) {
  const sub = State.subscriptions.find(s => s.id === id);
  if (!sub) return;
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(sub.paymentDay).padStart(2, '0')}`;
  const mk = monthKey(date);

  // Verificar duplicados
  const exists = State.transactions.some(t =>
    t.type === 'subscription' &&
    t.description === sub.name &&
    monthKey(t.date) === mk
  );
  if (exists) {
    showToast(`Ya existe un registro de "${sub.name}" este mes`, 'error');
    return;
  }

  State.transactions.push({
    id: uid('t'),
    date,
    personId: sub.personId,
    category: sub.category,
    description: sub.name,
    amount: sub.amount,
    paymentMethod: 'Auto-generado',
    notes: 'Suscripción mensual generada automáticamente',
    type: 'subscription',
    createdBy: State.currentUser,
    createdAt: new Date().toISOString()
  });
  State.saveTransactions();
  showToast('✓ Gasto del mes generado');
  render();
}

// INSTALLMENTS VIEW
// =============================================================================
function renderInstallments() {
  // Group by groupId
  const groups = {};
  State.transactions.forEach(t => {
    if (t.installmentInfo?.groupId) {
      if (!groups[t.installmentInfo.groupId]) {
        groups[t.installmentInfo.groupId] = {
          groupId: t.installmentInfo.groupId,
          description: t.description,
          personId: t.personId,
          category: t.category,
          totalAmount: t.installmentInfo.totalAmount,
          totalInstallments: t.installmentInfo.total,
          installmentAmount: t.amount,
          items: []
        };
      }
      groups[t.installmentInfo.groupId].items.push(t);
    }
  });
  const list = Object.values(groups).map(g => {
    const now = new Date();
    g.items.sort((a, b) => a.date.localeCompare(b.date));
    g.paid = g.items.filter(i => new Date(i.date + 'T00:00:00') < now).length;
    g.pending = g.items.length - g.paid;
    return g;
  }).sort((a, b) => b.items[0].date.localeCompare(a.items[0].date));

  const totalDebt = list.reduce((s, g) => s + (g.pending * g.installmentAmount), 0);

  // Próximo mes
  const next = new Date();
  next.setMonth(next.getMonth() + 1);
  const nextKey = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
  const nextMonth = State.transactions
    .filter(t => t.installmentInfo && monthKey(t.date) === nextKey)
    .reduce((s, t) => s + t.amount, 0);

  return `
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="card p-4">
          <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Deuda pendiente</p>
          <p class="font-display text-2xl font-bold number">${fmt(totalDebt)}</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">${list.filter(g => g.pending > 0).length} compras activas</p>
        </div>
        <div class="card p-4">
          <p class="text-xs uppercase tracking-wider mb-1" style="color: var(--color-text-muted);">Cuotas próximo mes</p>
          <p class="font-display text-2xl font-bold number">${fmt(nextMonth)}</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">A pagar próximamente</p>
        </div>
      </div>

      ${list.length === 0 ? `
        <div class="card p-8 text-center">
          <i data-lucide="credit-card" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
          <p style="color: var(--color-text-muted);">Sin compras a cuotas registradas</p>
        </div>
      ` : `
        <div class="space-y-3">
          ${list.map(g => {
            const p = getPerson(g.personId);
            const progress = (g.paid / g.totalInstallments) * 100;
            return `
              <div class="card p-4">
                <div class="flex items-start justify-between mb-3 gap-3">
                  <div class="min-w-0 flex-1">
                    <p class="font-semibold truncate">${escapeHtml(g.description)}</p>
                    <p class="text-xs" style="color: var(--color-text-muted);">
                      ${escapeHtml(p ? p.name : '?')} · ${escapeHtml(g.category)}
                    </p>
                  </div>
                  <div class="text-right flex-shrink-0">
                    <p class="font-display font-bold number">${fmt(g.totalAmount)}</p>
                    <p class="text-xs" style="color: var(--color-text-muted);">${fmt(g.installmentAmount)} × ${g.totalInstallments}</p>
                  </div>
                </div>
                <div class="mb-2">
                  <div class="flex justify-between text-xs mb-1" style="color: var(--color-text-muted);">
                    <span>${g.paid} pagadas / ${g.pending} pendientes</span>
                    <span class="font-semibold">${progress.toFixed(0)}%</span>
                  </div>
                  <div class="h-2 rounded-full overflow-hidden" style="background: var(--color-border);">
                    <div class="h-full transition-all" style="width: ${progress}%; background: var(--color-primary);"></div>
                  </div>
                </div>
                <div class="flex flex-wrap gap-1 mt-3">
                  ${g.items.map(c => {
                    const paid = new Date(c.date + 'T00:00:00') < new Date();
                    return `
                      <span class="text-xs px-2 py-1 rounded inline-flex items-center gap-1"
                            style="background: ${paid ? 'var(--color-success-soft)' : 'var(--color-bg-2)'};
                                   color: ${paid ? 'var(--color-success)' : 'var(--color-text-muted)'};"
                            title="${new Date(c.date + 'T00:00:00').toLocaleDateString('es-CL')} — ${fmt(c.amount)}">
                        ${paid ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                        #${c.installmentInfo.number}
                      </span>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

      <!-- Lista de metas -->
      ${goals.length === 0 ? `
        <div class="card p-8 text-center">
          <i data-lucide="target" class="w-12 h-12 mx-auto mb-3" style="color: var(--color-text-subtle);"></i>
          <p style="color: var(--color-text-muted);">Aún no tienes metas definidas</p>
          <p class="text-xs mt-1" style="color: var(--color-text-subtle);">Crea tu primera meta de ahorro arriba</p>
        </div>
      ` : `
        <div class="space-y-3">
          ${goals.sort((a, b) => {
            // Pendientes primero, completadas al final
            const ap = (a.saved || 0) >= a.target ? 1 : 0;
            const bp = (b.saved || 0) >= b.target ? 1 : 0;
            return ap - bp;
          }).map(g => {
            const saved = g.saved || 0;
            const progress = g.target > 0 ? (saved / g.target) * 100 : 0;
            const completed = saved >= g.target;
            const remaining = Math.max(0, g.target - saved);

            // Calcular tiempo restante
            let timeInfo = '';
            if (g.deadline) {
              const today = new Date();
              today.setHours(0, 0, 0, 0);
              const deadline = new Date(g.deadline + 'T00:00:00');
              const daysLeft = Math.floor((deadline - today) / (1000 * 60 * 60 * 24));
              if (completed) {
                timeInfo = '🎉 ¡Meta cumplida!';
              } else if (daysLeft < 0) {
                timeInfo = `⚠️ Vencida hace ${Math.abs(daysLeft)} días`;
              } else if (daysLeft === 0) {
                timeInfo = '⏰ Vence hoy';
              } else if (daysLeft <= 30) {
                timeInfo = `⏰ ${daysLeft} días restantes`;
              } else {
                const monthsLeft = Math.floor(daysLeft / 30);
                timeInfo = `${monthsLeft} ${monthsLeft === 1 ? 'mes' : 'meses'} restantes`;
              }
            } else if (completed) {
              timeInfo = '🎉 ¡Meta cumplida!';
            }

            return `
              <div class="card p-4 ${completed ? 'opacity-90' : ''}">
                <div class="flex items-start justify-between gap-3 mb-3">
                  <div class="min-w-0 flex-1">
                    <p class="font-semibold flex items-center gap-2">
                      ${completed ? '<i data-lucide="check-circle-2" class="w-4 h-4" style="color: var(--color-success);"></i>' : ''}
                      ${escapeHtml(g.name)}
                    </p>
                    <p class="text-xs" style="color: var(--color-text-muted);">${timeInfo}</p>
                  </div>
                  <div class="flex gap-1">
                    <button data-action="edit-goal" data-id="${g.id}" class="btn btn-ghost p-2" title="Editar">
                      <i data-lucide="edit-2" class="w-4 h-4"></i>
                    </button>
                    <button data-action="delete-goal" data-id="${g.id}" class="btn btn-ghost p-2" title="Eliminar"
                            style="color: var(--color-danger);">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>

                <div class="grid grid-cols-3 gap-2 text-sm mb-3">
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Ahorrado</p>
                    <p class="font-display font-bold number" style="color: var(--color-success);">${fmt(saved)}</p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Falta</p>
                    <p class="font-display font-bold number">${fmt(remaining)}</p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-wider" style="color: var(--color-text-muted);">Objetivo</p>
                    <p class="font-display font-bold number">${fmt(g.target)}</p>
                  </div>
                </div>

                <div>
                  <div class="flex justify-between text-xs mb-1" style="color: var(--color-text-muted);">
                    <span>Progreso</span>
                    <span class="font-semibold">${progress.toFixed(0)}%</span>
                  </div>
                  <div class="h-3 rounded-full overflow-hidden" style="background: var(--color-border);">
                    <div class="h-full transition-all"
                         style="width: ${Math.min(progress, 100)}%;
                                background: ${completed ? 'var(--color-success)' : 'var(--color-primary)'};"></div>
                  </div>
                </div>

                ${!completed ? `
                  <div class="mt-3 pt-3 border-t flex items-center gap-2" style="border-color: var(--color-border);">
                    <input type="number" id="goal-add-${g.id}" class="input flex-1 text-sm py-1.5"
                           placeholder="Agregar ahorro al objetivo">
                    <button data-action="add-goal-saving" data-id="${g.id}" class="btn btn-primary text-sm">
                      <i data-lucide="plus" class="w-4 h-4"></i>
                      Sumar
                    </button>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

function bindGoals() {
  document.querySelectorAll('[data-form-action]').forEach(el => {
    el.addEventListener('click', e => {
      const a = e.currentTarget.dataset.formAction;
      if (a === 'show-goal') {
        GoalForm.reset();
        GoalForm.show = true;
        render();
      }
      if (a === 'cancel-goal') {
        GoalForm.reset();
        render();
      }
      if (a === 'save-goal') saveGoal();
    });
  });
}

function saveGoal() {
  const name = document.getElementById('goal-name').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  const saved = parseFloat(document.getElementById('goal-saved').value) || 0;
  const deadline = document.getElementById('goal-deadline').value;

  if (!name || !target || target <= 0) {
    showToast('Completa nombre y monto objetivo válido', 'error');
    return;
  }

  if (GoalForm.editingId) {
    State.goals = State.goals.map(g =>
      g.id === GoalForm.editingId ? { ...g, name, target, saved, deadline } : g
    );
    showToast('✓ Meta actualizada');
  } else {
    State.goals.push({
      id: uid('g'),
      name, target, saved, deadline,
      createdAt: new Date().toISOString(),
      createdBy: State.currentUser
    });
    showToast('✓ Meta creada');
  }
  State.saveToAPI();
  GoalForm.reset();
  render();
}

function editGoal(id) {
  const g = State.goals.find(g => g.id === id);
  if (!g) return;
  GoalForm.editingId = id;
  GoalForm.name = g.name;
  GoalForm.target = g.target;
  GoalForm.saved = g.saved || 0;
  GoalForm.deadline = g.deadline || '';
  GoalForm.show = true;
  render();
}

function deleteGoal(id) {
  if (!confirm2('¿Eliminar esta meta?')) return;
  State.goals = State.goals.filter(g => g.id !== id);
  State.saveToAPI();
  showToast('✓ Meta eliminada');
  render();
}

function addGoalSaving(id) {
  const input = document.getElementById(`goal-add-${id}`);
  if (!input) return;
  const amount = parseFloat(input.value);
  if (!amount || amount <= 0) {
    showToast('Ingresa un monto válido', 'error');
    return;
  }
  State.goals = State.goals.map(g =>
    g.id === id ? { ...g, saved: (g.saved || 0) + amount } : g
  );
  State.saveToAPI();
  showToast(`✓ ${fmt(amount)} agregado a la meta`);
  render();
}
